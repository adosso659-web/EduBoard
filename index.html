<style>
:root{
  --red:#E8284A;--redL:#FFF0F2;--redM:#F95C73;
  --yellow:#F5C518;--yellowL:#FFFBEA;--yellowM:#FFE066;
  --green:#18C964;--greenL:#E6FFF2;--greenM:#5DDBA5;
  --blue:#3B82F6;--blueL:#EFF6FF;
  --ink:#18182E;--ink2:#3D3D5C;--muted:#8888AA;
  --bg:#F4F6FB;--white:#fff;--border:#E4E6F0;
  --shadow:rgba(24,24,46,0.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#D8DBE6}
#app{height:100%;max-width:500px;margin:0 auto;display:flex;flex-direction:column;background:var(--bg);box-shadow:0 0 40px rgba(0,0,0,.12);overflow:hidden;padding-top:env(safe-area-inset-top,0px)}

/* ── Inputs : jamais de redraw au keystroke ── */
input,textarea,select{font-family:inherit;-webkit-appearance:none;appearance:none;outline:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;-webkit-tap-highlight-color:transparent}
button:active{opacity:.75;transform:scale(.96)}
::-webkit-scrollbar{display:none}

.card{background:var(--white);border-radius:18px;border:1.5px solid var(--border);box-shadow:0 2px 14px var(--shadow);transition:box-shadow .2s}
.card:active{box-shadow:0 1px 4px var(--shadow)}
.inp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:11px 14px;color:var(--ink);font-size:15px;font-family:inherit;display:block;transition:border-color .15s,background .15s,box-shadow .15s}
.inp:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.inp.err{border-color:var(--red)!important;box-shadow:0 0 0 3px rgba(232,40,74,.1)!important}
.pill{display:inline-flex;align-items:center;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;white-space:nowrap}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes msgIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.fade{animation:fadeUp .26s ease both}
.popin{animation:pop .2s ease}
.msganim{animation:msgIn .16s ease}

/* Toast */
#toast{position:fixed;bottom:calc(86px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(16px);background:#18182E;color:#fff;padding:10px 20px;border-radius:22px;font-size:13px;font-weight:700;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:9999;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Search */
.searchbar{position:relative}
.searchbar input{padding-left:38px!important}
.searchbar::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;z-index:1}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:10px;color:var(--muted);font-size:14px;text-align:center}
.empty-icon{font-size:46px}

/* ── Bannière d'installation PWA ── */
#install-banner{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:500px;background:#fff;border-top:1.5px solid #E4E6F0;padding:14px 18px calc(14px + env(safe-area-inset-bottom,0px));display:flex;align-items:center;gap:12px;z-index:10000;transition:transform .35s cubic-bezier(.4,0,.2,1);box-shadow:0 -4px 24px rgba(0,0,0,.10)}
#install-banner.show{transform:translateX(-50%) translateY(0)}
#install-banner .ib-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#E8284A,#F5C518);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
#install-banner .ib-text{flex:1}
#install-banner .ib-title{font-weight:800;font-size:14px;color:#18182E}
#install-banner .ib-sub{font-size:12px;color:#8888AA;margin-top:2px}
#install-banner .ib-btn{background:#E8284A;color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;font-family:inherit}

/* ── Splash screen ── */
#splash{position:fixed;inset:0;background:linear-gradient(160deg,#E8284A,#F5C518);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .5s,transform .5s}
#splash.hide{opacity:0;transform:scale(1.06);pointer-events:none}

#splash .sp-title{font-family:Georgia,serif;font-size:42px;font-weight:900;color:#fff;letter-spacing:-1.5px}
#splash .sp-sub{color:rgba(255,255,255,.8);font-size:15px;margin-top:8px}
#splash .sp-loader{width:48px;height:4px;background:rgba(255,255,255,.3);border-radius:4px;margin-top:40px;overflow:hidden}
#splash .sp-bar{height:100%;background:#fff;border-radius:4px;animation:loadBar 1.4s ease forwards}

@keyframes ping{0%{transform:scale(1);opacity:.4}70%{transform:scale(2.2);opacity:0}100%{transform:scale(2.2);opacity:0}}

<script>
'use strict';

// ══════════════════════════════════════════════════════
//  RÈGLE D'OR : les callbacks d'input/textarea mutent S
//  directement (S.foo = v) SANS jamais appeler draw().
//  draw() n'est appelé que sur : clics boutons, selects,
//  envoi de formulaire, navigation.
// ══════════════════════════════════════════════════════

// ── Toast ───────────────────────────────────────────
function toast(msg, ms) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.classList.remove('show'); }, ms||2200);
}

// ══════════════════════════════════════════════════════
//  SUPABASE — Base de données en temps réel
//  Toutes les interactions sont partagées entre utilisateurs
// ══════════════════════════════════════════════════════
var SB_URL = 'https://ugqsicpfuxngmguyjwod.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVncXNpY3BmdXhuZ21ndXlqd29kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNjQ0NzksImV4cCI6MjA5MDk0MDQ3OX0.9QKqTOQtnZ8sxf1FX36IaoudDosbfViVsZBKtO4qqQ8';

var SB_HEADERS = {
  'apikey': SB_KEY,
  'Authorization': 'Bearer ' + SB_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

// ════════════════════════════════════════════════════════
//  STOCKAGE PERMANENT DES FICHIERS
//  Stratégie : Storage Supabase + cache IndexedDB hors-ligne
// ════════════════════════════════════════════════════════

var STORAGE_BUCKET = 'eduboard-files';
var STORAGE_URL    = SB_URL + '/storage/v1/object/public/' + STORAGE_BUCKET + '/';
var STORAGE_API    = SB_URL + '/storage/v1/object/' + STORAGE_BUCKET + '/';
var MAX_DB_SIZE    = 400 * 1024; // 400KB max en base64 dans la DB
var MAX_FILE_SIZE  = 20 * 1024 * 1024; // 20MB max par fichier

// ── Cache IndexedDB pour accès hors-ligne ────────────
var _idb = null;
function getIDB(){
  if(_idb) return Promise.resolve(_idb);
  return new Promise(function(res, rej){
    if(!window.indexedDB){ res(null); return; }
    var req = indexedDB.open('eduboard_files', 1);
    req.onupgradeneeded = function(e){
      var db = e.target.result;
      if(!db.objectStoreNames.contains('files')){
        db.createObjectStore('files', {keyPath:'url'});
      }
    };
    req.onsuccess = function(e){ _idb = e.target.result; res(_idb); };
    req.onerror   = function(){ res(null); };
  });
}

function idbSave(url, dataUrl){
  return getIDB().then(function(db){
    if(!db) return;
    try {
      var tx = db.transaction('files','readwrite');
      tx.objectStore('files').put({url: url, dataUrl: dataUrl, ts: Date.now()});
    } catch(e){}
  });
}

function idbGet(url){
  return getIDB().then(function(db){
    if(!db) return null;
    return new Promise(function(res){
      try {
        var tx = db.transaction('files','readonly');
        var req = tx.objectStore('files').get(url);
        req.onsuccess = function(){ res(req.result ? req.result.dataUrl : null); };
        req.onerror   = function(){ res(null); };
      } catch(e){ res(null); }
    });
  });
}

// ── Compression image avant upload ──────────────────
function compressImage(dataUrl, maxWidthPx, qualityJpeg, cb){
  var img = new Image();
  img.onload = function(){
    var w = img.naturalWidth, h = img.naturalHeight;
    if(w > maxWidthPx){
      h = Math.round(h * maxWidthPx / w);
      w = maxWidthPx;
    }
    var canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(canvas.toDataURL('image/jpeg', qualityJpeg));
  };
  img.onerror = function(){ cb(dataUrl); };
  img.src = dataUrl;
}

// ── Upload vers Supabase Storage ─────────────────────
function uploadToStorage(fileName, dataUrl, cb){
  // Convertir dataUrl en Blob binaire
  try {
    var parts   = dataUrl.split(',');
    var mime    = (parts[0].match(/:(.*?);/) || ['','application/octet-stream'])[1];
    var binary  = atob(parts[1]);
    var bytes   = new Uint8Array(binary.length);
    for(var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    var blob    = new Blob([bytes], {type: mime});
    var safeName = Date.now() + '_' + fileName.replace(/[^a-zA-Z0-9._-]/g,'_');
    var uploadUrl = STORAGE_API + safeName;

    fetch(uploadUrl, {
      method: 'POST',
      headers: {
        'apikey':        SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type':  mime,
        'x-upsert':      'true'
      },
      body: blob
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data && data.Key){
        var publicUrl = STORAGE_URL + safeName;
        idbSave(publicUrl, dataUrl); // Sauvegarder en cache hors-ligne
        cb(null, publicUrl);
      } else {
        cb(new Error(data.error || 'Upload échoué'), null);
      }
    })
    .catch(function(e){ cb(e, null); });
  } catch(e){ cb(e, null); }
}

// ── Charger un fichier (Storage ou base64 ou cache) ──
function loadFileUrl(file, cb){
  if(!file || (!file.dataUrl && !file.url)){
    cb(null); return;
  }
  // Déjà une dataUrl en mémoire
  if(file.dataUrl && file.dataUrl.startsWith('data:')){
    cb(file.dataUrl); return;
  }
  // URL Storage → vérifier cache IndexedDB d'abord
  var url = file.url || file.dataUrl;
  idbGet(url).then(function(cached){
    if(cached){ file.dataUrl = cached; cb(cached); return; }
    // Télécharger depuis Storage
    fetch(url)
      .then(function(r){ return r.blob(); })
      .then(function(blob){
        var reader = new FileReader();
        reader.onload = function(e){
          var du = e.target.result;
          file.dataUrl = du;
          idbSave(url, du);
          cb(du);
        };
        reader.readAsDataURL(blob);
      })
      .catch(function(){ cb(url); }); // fallback: URL directe
  });
}

// ── Préparer les fichiers d'une publication pour l'envoi ──
// Compresse et upload les gros fichiers, garde les petits en base64
function prepareFilesForPost(files, onProgress, onDone){
  if(!files || !files.length){ onDone([]); return; }

  var result = [];
  var pending = files.length;
  var done = 0;

  files.forEach(function(f, idx){
    if(!f.dataUrl){ 
      result[idx] = f; 
      if(++done === pending) onDone(result); 
      return; 
    }

    var ext = (f.name||'').split('.').pop().toLowerCase();
    var isImg = ['jpg','jpeg','png','gif','webp'].indexOf(ext) > -1;
    var rawSize = Math.round(f.dataUrl.length * 0.75); // taille binaire estimée

    onProgress && onProgress('Traitement de ' + (f.name||'fichier') + '…');

    if(isImg && rawSize > MAX_DB_SIZE){
      // Compresser puis uploader
      compressImage(f.dataUrl, 1600, 0.82, function(compressed){
        var compSize = Math.round(compressed.length * 0.75);
        if(compSize < MAX_DB_SIZE){
          // Assez petit après compression → garder en base64
          result[idx] = {name: f.name, size: fmtB(compSize), dataUrl: compressed};
          if(++done === pending) onDone(result);
        } else {
          // Encore trop gros → uploader sur Storage
          uploadToStorage(f.name, compressed, function(err, url){
            if(url){
              result[idx] = {name: f.name, size: f.size, url: url, dataUrl: compressed};
              idbSave(url, compressed);
            } else {
              // Échec upload → garder base64 compressé quand même
              result[idx] = {name: f.name, size: fmtB(compSize), dataUrl: compressed};
            }
            if(++done === pending) onDone(result);
          });
        }
      });
    } else if(!isImg && rawSize > MAX_DB_SIZE){
      // Document lourd → uploader directement
      uploadToStorage(f.name, f.dataUrl, function(err, url){
        if(url){
          result[idx] = {name: f.name, size: f.size, url: url};
        } else {
          result[idx] = f; // garder tel quel si échec
        }
        if(++done === pending) onDone(result);
      });
    } else {
      // Fichier léger → garder en base64
      result[idx] = f;
      if(++done === pending) onDone(result);
    }
  });
}


// Requête Supabase générique
function sbFetch(method, table, body, params){
  var url = SB_URL + '/rest/v1/' + table;
  if(params) url += '?' + params;
  // Timeout 8s pour éviter les requêtes bloquées
  var ctrl = typeof AbortController !== 'undefined' ? new AbortController() : null;
  var tid  = ctrl ? setTimeout(function(){ ctrl.abort(); }, 8000) : null;
  return fetch(url, {
    method: method,
    headers: SB_HEADERS,
    signal: ctrl ? ctrl.signal : undefined,
    body: body ? JSON.stringify(body) : undefined
  }).then(function(r){ if(tid) clearTimeout(tid); return r.ok ? r.json().catch(function(){return null;}) : null; }).catch(function(){ if(tid) clearTimeout(tid); return null; });
}

// ── Temps réel via Supabase Realtime (WebSocket) ─────
var _realtimeWs = null;
var _presenceWs = null;       // WebSocket dédié au Presence
var _onlineUsers = {};        // { userId: {name, role, lastSeen} }
var _myPresenceKey = null;    // Clé unique de cette session

// ── Heartbeat Presence (ping toutes les 20s) ──────────
var _presenceInterval = null;

function startPresence(){
  if(typeof S === 'undefined' || !S.user) return;
  if(_presenceWs) return;
  _myPresenceKey = S.user.id + '_' + Date.now();

  var wsUrl = SB_URL.replace('https://','wss://') + '/realtime/v1/websocket?apikey=' + SB_KEY + '&vsn=1.0.0';
  try {
    _presenceWs = new WebSocket(wsUrl);
    _presenceWs.onopen = function(){
      // Rejoindre le canal Presence (sauf admin en mode discret)
      if(!isStealthMode()) _presenceWs.send(JSON.stringify({
        topic: 'realtime:presence',
        event: 'phx_join',
        payload: {
          config: { presence: { key: _myPresenceKey } }
        },
        ref: 'presence'
      }));
      // Annoncer sa présence
      setTimeout(function(){ broadcastPresence(); }, 500);
      // Heartbeat toutes les 20 secondes
      _presenceInterval = setInterval(broadcastPresence, 20000);
    };
    _presenceWs.onmessage = function(e){
      try {
        var msg = JSON.parse(e.data);
        // Répondre aux heartbeat du serveur
        if(msg.event === 'phx_reply' && msg.payload && msg.payload.status === 'ok') return;
        if(msg.event === 'heartbeat'){
          _presenceWs.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:'hb'}));
          return;
        }
        // Mise à jour de la liste des présents
        if(msg.event === 'presence_state' || msg.event === 'presence_diff'){
          updateOnlineUsers(msg.payload);
        }
      } catch(err){}
    };
    _presenceWs.onclose = function(){
      clearInterval(_presenceInterval);
      _presenceWs = null;
      setTimeout(startPresence, 5000);
    };
    _presenceWs.onerror = function(){};
  } catch(e){}
}

function broadcastPresence(){
  if(typeof S === 'undefined' || !S.user) return;
  if(isStealthMode()) return; // Admin en mode discret : ne diffuse pas sa présence
  if(!_presenceWs || _presenceWs.readyState !== 1) return;
  _presenceWs.send(JSON.stringify({
    topic: 'realtime:presence',
    event: 'presence',
    payload: {
      type: 'broadcast',
      event: 'online',
      payload: {
        key: _myPresenceKey,
        userId: S.user.id,
        name: S.user.name,
        role: S.user.role,
        ts: Date.now()
      }
    },
    ref: 'bc'
  }));
}

function updateOnlineUsers(payload){
  if(!payload) return;
  // Traiter presence_state (état complet) et presence_diff (arrivées/départs)
  var now = Date.now();
  var changed = false;

  // Ajouter/mettre à jour
  var joins = payload.joins || payload;
  if(joins && typeof joins === 'object'){
    Object.keys(joins).forEach(function(k){
      var u = joins[k];
      var metas = (u.metas || [u])[0] || {};
      if(metas.userId){
        _onlineUsers[metas.key || k] = {
          userId: metas.userId, name: metas.name,
          role: metas.role, ts: metas.ts || now
        };
        changed = true;
      }
    });
  }
  // Retirer les partants
  var leaves = payload.leaves;
  if(leaves && typeof leaves === 'object'){
    Object.keys(leaves).forEach(function(k){
      delete _onlineUsers[k];
      changed = true;
    });
  }
  // Nettoyer les sessions inactives (> 45s sans ping)
  Object.keys(_onlineUsers).forEach(function(k){
    if(now - (_onlineUsers[k].ts||0) > 45000){
      delete _onlineUsers[k]; changed = true;
    }
  });

  if(changed && typeof S !== 'undefined' && isAdmin() && S.tab==='profile' && !S.view) draw();
}

// Fallback simple : compter via localStorage les onglets actifs
// (fonctionne même si Presence WebSocket échoue)
var _localOnlineKey = null; // calculé au premier appel, après que S soit défini
function getLocalOnlineKey(){
  if(!_localOnlineKey) _localOnlineKey = 'eb_online_' + (S && S.user ? S.user.id : 'anon_'+Date.now());
  return _localOnlineKey;
}
function pingLocalPresence(){
  if(!S || !S.user) return {};
  // En mode discret : l'admin ne se manifeste pas dans la présence
  if(isStealthMode()) return {};
  var key = getLocalOnlineKey();
  var sessions = {};
  try { sessions = JSON.parse(localStorage.getItem('eb_sessions')||'{}'); } catch(e){}
  sessions[key] = {
    name: S.user.name, role: S.user.role, ts: Date.now()
  };
  // Nettoyer les sessions mortes (> 45s)
  var now = Date.now();
  Object.keys(sessions).forEach(function(k){
    if(now - (sessions[k].ts||0) > 45000) delete sessions[k];
  });
  localStorage.setItem('eb_sessions', JSON.stringify(sessions));
  return sessions;
}

function getOnlineCount(){
  var wsUsers = Object.values(_onlineUsers);
  var now = Date.now();
  // Nettoyer les sessions expirées
  wsUsers = wsUsers.filter(function(u){ return now-(u.ts||0)<45000; });
  if(wsUsers.length > 0) return { count: wsUsers.length, users: wsUsers };
  // Fallback local
  var sessions = pingLocalPresence() || {};
  var active = Object.values(sessions).filter(function(s){ return now-(s.ts||0)<45000; });
  // Toujours inclure l'utilisateur courant
  if(S && S.user && !active.find(function(a){ return a.name===S.user.name; })){
    active.unshift({name:S.user.name, role:S.user.role, ts:now});
  }
  return { count: active.length, users: active };
}

// Ping local toutes les 10s pour un compteur en ligne plus précis
setInterval(function(){
  if(typeof S === 'undefined' || !S.user) return;
  pingLocalPresence();
  // Rafraîchir le panneau admin si ouvert
  if(isAdmin() && S.tab==='profile' && !S.view) draw();
}, 10000);

function startRealtime(){
  if(_realtimeWs) return;
  var wsUrl = SB_URL.replace('https://','wss://') + '/realtime/v1/websocket?apikey=' + SB_KEY + '&vsn=1.0.0';
  try {
    _realtimeWs = new WebSocket(wsUrl);
    _realtimeWs.onopen = function(){
      // Heartbeat immédiat
      _realtimeWs.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:'hb_init'}));
      // S'abonner aux changements sur posts, messages, rooms et accounts
      ['posts','messages','rooms','accounts'].forEach(function(table){
        _realtimeWs.send(JSON.stringify({
          topic: 'realtime:public:'+table,
          event: 'phx_join',
          payload: {
            config: { broadcast: { self: false }, presence: { key: '' } }
          },
          ref: table
        }));
      });
    };
    // Heartbeat toutes les 25s pour maintenir la connexion active
    var _wsHeartbeat = setInterval(function(){
      if(_realtimeWs && _realtimeWs.readyState===1){
        _realtimeWs.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:'hb'}));
      } else {
        clearInterval(_wsHeartbeat);
      }
    }, 25000);
    _realtimeWs.onmessage = function(e){
      try {
        var msg = JSON.parse(e.data);
        var payload = msg.payload;
        if(!payload || !payload.type) return;
        var rec = payload.record || payload.old_record;
        var table = (msg.topic||'').split(':')[2];

        if(table==='accounts'){
          if(payload.type==='INSERT'||payload.type==='UPDATE'){
            S.accounts[rec.id]={
              id:rec.id, name:rec.name, role:rec.role,
              subject:rec.subject||'Maths', bio:rec.bio||'',
              avatar:rec.avatar||null, color:rec.color||'#3B82F6',
              ratings:rec.ratings||[]
            };
            // Actualiser le profil admin si ouvert
            if(S.tab==='profile'&&!S.view&&isAdmin()) draw();
          }
        }
        if(table==='posts'){
          if(payload.type==='INSERT'){
            if(!S.posts.find(function(p){return p.id===rec.id;})){
              S.posts.unshift(formatPost(rec));
              if(S.tab==='feed'&&!S.view) draw();
            }
          }
          if(payload.type==='DELETE'){
            S.posts = S.posts.filter(function(p){return p.id!==rec.id;});
            if(S.view==='detail'&&S.selPost&&S.selPost.id===rec.id) set({view:null,selPost:null});
            else if(S.tab==='feed'&&!S.view) draw();
          }
        }
        if(table==='messages'){
          if(payload.type==='INSERT'){
            var rIdx = S.rooms.findIndex(function(r){return r.id===rec.room_id;});
            if(rIdx>=0){
              if(!S.rooms[rIdx].messages.find(function(m){return m.id===rec.id;})){
                S.rooms[rIdx].messages.push(formatMessage(rec));
                // Notification si membre + activé + pas en train de lire ce salon
                (function(){
                  var rid=rec.room_id; var aid=rec.author_id||''; var aname=rec.author_name||''; var txt=rec.text||'';
                  if(!S.user||aid===S.user.id) return;
                  var rm=S.rooms.find(function(r){return r.id===rid;});
                  if(!rm) return;
                  var isMbr=rm.members.includes(S.user.id)||rm.ownerId===S.user.id;
                  if(!isMbr) return;
                  var viewingRoom=S.view==='roomview'&&S.selRoom&&S.selRoom.id===rid;
                  if(!viewingRoom){ S.notifBadge=(S.notifBadge||0)+1; }
                  if(!viewingRoom&&S.notifRooms&&S.notifRooms[rid]&&'Notification' in window&&Notification.permission==='granted'){
                    try{new Notification('💬 '+rm.name,{body:aname+' : '+(txt.length>80?txt.slice(0,80)+'…':txt),tag:'room-'+rid,renotify:true});}catch(ex){}
                  }
                })();
                if(S.view==='roomview'&&S.selRoom&&S.selRoom.id===rec.room_id){
                  S.selRoom=S.rooms[rIdx]; draw(); setTimeout(scrollChat,50);
                } else { draw(); }
              }
            }
          }
        }
        if(table==='rooms'){
          if(payload.type==='INSERT'){
            if(!S.rooms.find(function(r){return r.id===rec.id;})){
              S.rooms.push(formatRoom(rec));
              if(S.tab==='chat'&&!S.view) draw();
            }
          }
          if(payload.type==='UPDATE'){
            var ri=S.rooms.findIndex(function(r){return r.id===rec.id;});
            if(ri>=0){ S.rooms[ri]=formatRoom(rec); if(S.view==='roomview'&&S.selRoom&&S.selRoom.id===rec.id){S.selRoom=S.rooms[ri];draw();} }
          }
        }
      } catch(err){}
    };
    _realtimeWs.onerror = function(){};
    _realtimeWs.onclose = function(){
      _realtimeWs=null;
      setTimeout(startRealtime, 3000); // reconnexion auto
    };
  } catch(e){}
}

// ── Formateurs (Supabase → format interne) ───────────
function formatPost(r){
  // Robuste pour les anciennes publications avec champs manquants
  var files = r.files || [];
  if(typeof files === 'string'){
    try{ files = JSON.parse(files); }catch(e){ files = []; }
  }
  if(!Array.isArray(files)) files = [];

  // Compatibilité ancien champ author vs author_id/author_name
  var authorId   = r.author_id   || r.authorId   || r.user_id || '';
  var authorName = r.author_name || r.authorName  || r.author  || 'Auteur inconnu';

  // Compatibilité ancien champ due_date vs dueDate
  var dueDate = r.due_date || r.dueDate || r.due || '';

  // Compatibilité ancien champ subject/matiere
  var subject = r.subject || r.matiere || r.matière || 'Autre';

  // Compatibilité ancien champ type/category
  var type = r.type || r.category || r.categorie || 'Exercice';

  return {
    id:         r.id,
    authorId:   authorId,
    authorName: authorName,
    subject:    subject,
    type:       type,
    title:      r.title || r.titre || '(Sans titre)',
    description:r.description || r.contenu || r.content || '',
    dueDate:    dueDate,
    classe:     r.classe || r.class || r.niveau || '',
    files:      files,
    createdAt:  fmtAge(r.created_at || r.createdAt || new Date().toISOString()),
    rating:     r.rating || 0,
    ratingCount:r.rating_count || 0
  };
}
function formatRoom(r){
  return {
    id:r.id, name:r.name, emoji:r.emoji||'💬',
    desc:r.description||'', ownerId:r.owner_id||'',
    members:r.members||[], maxMembers:r.max_members||5,
    messages:r.messages||[]
  };
}
function formatMessage(r){
  return {
    id:r.id, authorId:r.author_id, authorName:r.author_name,
    text:r.text, time:fmtTime(r.created_at)
  };
}
function fmtAge(iso){
  if(!iso) return 'À l\'instant';
  var diff=Math.floor((Date.now()-new Date(iso).getTime())/1000);
  if(diff<60) return 'À l\'instant';
  if(diff<3600) return 'il y a '+Math.floor(diff/60)+'min';
  if(diff<86400) return 'il y a '+Math.floor(diff/3600)+'h';
  return 'il y a '+Math.floor(diff/86400)+'j';
}
function fmtTime(iso){
  if(!iso) return nowT();
  return new Date(iso).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}

// ── Chargement initial depuis Supabase ────────────────
var _loaded = false;
function loadFromSupabase(){
  // Timeout de sécurité : si Supabase ne répond pas en 10s → on continue
  var _sbTimeout = setTimeout(function(){
    console.warn('[EduBoard] Supabase timeout — mode hors-ligne');
    if(!_loaded){ _loaded=true; draw(); }
  }, 10000);

  // Vérifier si on est sur un fichier local (content:// ou file://)
  var isLocal = window.location.protocol === 'content:' ||
                window.location.protocol === 'file:' ||
                window.location.hostname === 'localhost' ||
                window.location.hostname === '';
  if(isLocal){
    // En local : Supabase est inaccessible à cause de CORS
    // On utilise uniquement les données locales
    clearTimeout(_sbTimeout);
    console.log('[EduBoard] Mode local — données cache uniquement');
    if(!_loaded){ _loaded=true; draw(); }
    return;
  }

  Promise.all([sbGetPosts(), sbGetRooms(), sbGetAccounts()]).then(function(results){
    clearTimeout(_sbTimeout);
    var posts = results[0];
    var rooms = results[1];
    var accounts = results[2];

    if(Array.isArray(posts)){
      if(posts.length === 0){
        // Base vide → insérer les données de démo
        seedSupabase();
      } else {
        // Fusionner : garder les posts locaux non encore synchronisés
        // + tous les posts Supabase (y compris les anciennes publications)
        S.posts = posts.map(formatPost);
        savePosts(); // mettre à jour le cache local
      }
    }

    if(Array.isArray(rooms) && rooms.length >= 0){
      var roomObjs = rooms.map(formatRoom);
      var msgPromises = roomObjs.map(function(room){
        return sbGetMessages(room.id).then(function(msgs){
          room.messages = Array.isArray(msgs) ? msgs.map(formatMessage) : [];
          return room;
        });
      });
      return Promise.all(msgPromises).then(function(filledRooms){
        S.rooms = filledRooms.length > 0 ? filledRooms : S.rooms;
        if(Array.isArray(accounts)){
          accounts.forEach(function(a){
            S.accounts[a.id] = {
              id:a.id, name:a.name, role:a.role,
              subject:a.subject||'Maths', bio:a.bio||'',
              avatar:a.avatar||null, color:a.color||'#3B82F6',
              ratings:a.ratings||[]
            };
          });
        }
        _loaded=true; draw(); startRealtime();
      });
    }
    _loaded=true; draw(); startRealtime();
  }).catch(function(e){
    clearTimeout(_sbTimeout);
    console.warn('[EduBoard] Supabase erreur:', e);
    if(!_loaded){ _loaded=true; draw(); }
    startRealtime();
  });
}

// ── Codes administrateurs (chiffrés SHA-256) ─────────
// Les codes en clair ne sont JAMAIS stockés dans ce fichier.
// Seuls leurs empreintes SHA-256 sont présentes — irréversibles.
var ADMIN_HASHES = {
  3906622573: 'Daaix1306',
  2598615863: 'Azizx'
};

// Calcule le hash SHA-256 d'une chaîne via l'API Web Crypto (native, aucune lib)
// Hash djb2 pur JS — synchrone, fonctionne partout sans crypto.subtle
function djb2Hash(str){
  var h = 5381;
  for(var i=0; i<str.length; i++){
    h = ((h << 5) + h) + str.charCodeAt(i);
    h = h & 0xFFFFFFFF;
  }
  return (h >>> 0); // unsigned 32-bit
}

// Vérifie le code admin — synchrone et fiable
function checkAdminCode(code){
  var hash = djb2Hash(code.trim());
  var name = ADMIN_HASHES[hash] || null;
  return Promise.resolve(name);
}

// ── Helpers DOM ──────────────────────────────────────
function h(tag, attrs) {
  var e = document.createElement(tag);
  var kids = Array.prototype.slice.call(arguments,2);
  if (attrs) for (var k in attrs) {
    var v = attrs[k];
    if (k==='style'&&typeof v==='object') Object.assign(e.style,v);
    else if (k==='cls') e.className=v;
    else if (k.slice(0,2)==='on') e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  kids.forEach(function(c){
    if(c==null||c===false) return;
    if(Array.isArray(c)) c.forEach(function(cc){if(cc) e.appendChild(typeof cc==='string'?document.createTextNode(cc):cc);});
    else e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return e;
}
function tx(s){return document.createTextNode(String(s!=null?s:''));}

function Stars(val,size,cb){

function Inp(val,cb,ph,err,extra){
  var e=h('input',Object.assign({cls:'inp'+(err?' err':''),placeholder:ph||''},extra||{}));
  e.value=val||'';
  e.addEventListener('input',function(ev){cb(ev.target.value);});

}
function TA(val,cb,ph,rows){
  var e=h('textarea',{cls:'inp',placeholder:ph||'',rows:rows||4,style:{resize:'none',lineHeight:'1.6'}});

  e.addEventListener('input',function(ev){cb(ev.target.value);});

}
// Sel : change = clic utilisateur, draw() OK
function Sel(val,cb,opts){
  var e=h('select',{cls:'inp',style:{padding:'10px',cursor:'pointer'}},
    opts.map(function(o){return h('option',{value:o},tx(o));}));
  e.value=val||opts[0];
  e.addEventListener('change',function(ev){cb(ev.target.value);});
  return e;
}

// ══ LIGHTBOX ════════════════════════════════════════
var _lbImgs=[]; var _lbIdx=0;
function openLightbox(imgs, startIdx){
  _lbImgs=imgs; _lbIdx=startIdx||0;
  var lb=document.getElementById('lightbox');
  var img=document.getElementById('lb-img');
  var ctr=document.getElementById('lb-counter');
  var nav=document.getElementById('lb-nav');
  if(!lb||!img) return;
  lb.classList.add('open'); lb.style.display='flex';
  img.src=_lbImgs[_lbIdx];
  if(ctr) ctr.textContent=(_lbIdx+1)+'/'+_lbImgs.length;
  if(nav) nav.style.display=_lbImgs.length>1?'flex':'none';
  document.body.style.overflow='hidden';
}
function closeLightbox(){
  var lb=document.getElementById('lightbox');
  if(lb){lb.classList.remove('open');lb.style.display='none';}
  document.body.style.overflow='';
}
function lbGo(dir){
  if(!_lbImgs.length) return;
  _lbIdx=(_lbIdx+dir+_lbImgs.length)%_lbImgs.length;
  var img=document.getElementById('lb-img');
  var ctr=document.getElementById('lb-counter');
  if(img) img.src=_lbImgs[_lbIdx];
  if(ctr) ctr.textContent=(_lbIdx+1)+'/'+_lbImgs.length;
}
(function(){
  var _lbTx=null;
  document.addEventListener('DOMContentLoaded',function(){
    var cl=document.getElementById('lb-close');
    var pv=document.getElementById('lb-prev');
    var nx=document.getElementById('lb-next');
    var lb=document.getElementById('lightbox');
    if(cl) cl.addEventListener('click',closeLightbox);
    if(pv) pv.addEventListener('click',function(){lbGo(-1);});
    if(nx) nx.addEventListener('click',function(){lbGo(1);});
    if(lb){
      lb.addEventListener('click',function(e){if(e.target===lb)closeLightbox();});
      lb.addEventListener('touchstart',function(e){_lbTx=e.touches[0].clientX;},{passive:true});
      lb.addEventListener('touchend',function(e){
        if(_lbTx===null) return;
        var dx=e.changedTouches[0].clientX-_lbTx; _lbTx=null;
        if(Math.abs(dx)>50) lbGo(dx>0?-1:1);
      },{passive:true});
    }
    document.addEventListener('keydown',function(e){
      var lb2=document.getElementById('lightbox');
      if(!lb2||lb2.style.display==='none') return;
      if(e.key==='Escape') closeLightbox();
      if(e.key==='ArrowLeft') lbGo(-1);
      if(e.key==='ArrowRight') lbGo(1);
    });
  });
})();

function buildImagePreview(files){
  var IMGEXTS=['jpg','jpeg','png','gif','webp','svg'];
  var imgs=(files||[]).filter(function(f){
    var ext=(f.name||'').split('.').pop().toLowerCase();
    var isImg=IMGEXTS.indexOf(ext)>-1;
    // Accepter aussi les fichiers avec url Storage (pas encore en dataUrl local)
    return isImg&&(f.dataUrl||f.url);
  });
  if(!imgs.length) return null;

// Dessine le watermark sur un canvas déjà chargé avec l'image
function _drawWatermarkOnCanvas(canvas){
  var ctx = canvas.getContext('2d');
  var w = canvas.width;
  var h = canvas.height;
  if(!w || !h) return;

  var fontSize = Math.max(14, Math.min(w, h) * 0.052);
  var text = 'EduBoard';
  var angle = -35 * Math.PI / 180;

  // Grille diagonale répétée
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = '#18182E';
  ctx.font = 'bold ' + fontSize + 'px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  var spacingX = fontSize * 7;
  var spacingY = fontSize * 4;
  var diag = Math.sqrt(w*w + h*h);
  ctx.translate(w/2, h/2);
  ctx.rotate(angle);
  for(var gy = -diag; gy < diag; gy += spacingY){
    for(var gx = -diag; gx < diag; gx += spacingX){
      ctx.fillText(text, gx, gy);
    }
  }
  ctx.restore();

  // Bandeau bas semi-transparent
  var bH = Math.max(20, Math.round(h * 0.034));
  var fSize = Math.max(9, Math.round(bH * 0.58));
  ctx.save();
  ctx.fillStyle = 'rgba(24,24,46,0.68)';
  ctx.fillRect(0, h - bH, w, bH);
  ctx.font = 'bold ' + fSize + 'px Georgia, serif';
  ctx.textBaseline = 'middle';
  var cy = h - bH/2;
  // "Edu" en blanc
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'right';
  var wEdu = ctx.measureText('Edu').width;
  var wBoard = ctx.measureText('Board').width;
  var totalW = wEdu + wBoard;
  var startX = w - 8;
  ctx.fillText('Edu', startX - wBoard, cy);
  // "Board" en rouge
  ctx.fillStyle = '#E8284A';
  ctx.fillText('Board', startX, cy);
  ctx.restore();
}

// Convertit un SVG data URI en PNG via canvas (sans blobURL — compatible mobile)
function _svgDataUriToPng(dataUrl, w, h, cb){
  var img = new Image();
  img.onload = function(){
    var cw = img.naturalWidth || w || 800;
    var ch = img.naturalHeight || h || 600;
    if(cw < 10) cw = 800;
    if(ch < 10) ch = 600;
    var canvas = document.createElement('canvas');
    canvas.width = cw;
    canvas.height = ch;
    var ctx = canvas.getContext('2d');
    try {
      ctx.drawImage(img, 0, 0, cw, ch);
      cb(canvas);
    } catch(e){ cb(null); }
  };
  img.onerror = function(){
    // Fallback: décoder et ré-encoder le SVG en data URI inline
    try {
      var svgStr;
      if(dataUrl.indexOf(';base64,') > -1){
        svgStr = atob(dataUrl.split(',')[1]);
      } else {
        svgStr = decodeURIComponent(dataUrl.split(',')[1]);
      }
      // Assurer width/height
      if(svgStr.indexOf('width=') === -1){
        svgStr = svgStr.replace('<svg', '<svg width="800" height="600"');
      }
      // Ré-encoder sans blob
      var inlineUri = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgStr)));
      var img2 = new Image();
      img2.onload = function(){
        var cw2 = img2.naturalWidth || 800;
        var ch2 = img2.naturalHeight || 600;
        var c2 = document.createElement('canvas');
        c2.width = cw2; c2.height = ch2;
        try { c2.getContext('2d').drawImage(img2, 0, 0); cb(c2); } catch(e2){ cb(null); }
      };
      img2.onerror = function(){ cb(null); };
      img2.src = inlineUri;
    } catch(e){ cb(null); }
  };
  // Charger directement le data URI SVG (fonctionne si already base64)
  img.src = dataUrl;
}

// Applique le watermark et appelle callback(pngDataUrl)
function applyWatermark(dataUrl, fileName, callback){
  var ext = (fileName||'unknown.png').split('.').pop().toLowerCase();
  var isImg = ['jpg','jpeg','png','gif','webp'].indexOf(ext) > -1;
  var isSvg = ext === 'svg';

  // Fichiers non-image : téléchargement direct
  if(!isImg && !isSvg){ callback(dataUrl, false); return; }

  if(isSvg){
    // SVG → blob URL → canvas (évite le tainted canvas)
    _svgDataUriToPng(dataUrl, 800, 600, function(canvas){
      if(!canvas){ callback(dataUrl, false); return; } // fallback
      _drawWatermarkOnCanvas(canvas);
      try {
        callback(canvas.toDataURL('image/png', 0.93), true);
      } catch(e){ callback(dataUrl, false); }
    });
  } else {
    // PNG/JPG/GIF/WEBP → canvas direct
    var img = new Image();
    img.onload = function(){
      var canvas = document.createElement('canvas');
      canvas.width  = img.naturalWidth  || img.width  || 800;
      canvas.height = img.naturalHeight || img.height || 600;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      _drawWatermarkOnCanvas(canvas);
      try {
        callback(canvas.toDataURL('image/png', 0.93), true);
      } catch(e){ callback(dataUrl, false); }
    };
    img.onerror = function(){ callback(dataUrl, false); };
    img.src = dataUrl;
  }
}

// Déclenche le téléchargement — compatible mobile sans blobURL
function _triggerDownload(dataUrl, fileName){
  var a = document.createElement('a');
  a.href = dataUrl;
  a.download = fileName;
  a.style.display = 'none';
  a.rel = 'noopener';
  document.body.appendChild(a);
  try { a.click(); } catch(e) {}
  setTimeout(function(){ 
    try { document.body.removeChild(a); } catch(e2){}
  }, 1500);
}

function saveToMyDownloads(file, postTitle, postSubject){
  if(!file||!file.name) return;
  var item={
    name: file.name,
    size: file.size||'',
    url:  file.url||null,
    dataUrl: file.dataUrl||null,
    postTitle: postTitle||'',
    postSubject: postSubject||'',
    savedAt: new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}),
    id: 'dl_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)
  };
  if(!Array.isArray(S.myDownloads)) S.myDownloads=[];
  // Éviter les doublons (même nom + même post)
  var exists=S.myDownloads.some(function(d){ return d.name===item.name&&d.postTitle===item.postTitle; });
  if(!exists){
    S.myDownloads.unshift(item);
    if(S.myDownloads.length>200) S.myDownloads=S.myDownloads.slice(0,200);
    try{ localStorage.setItem('eb_mydownloads',JSON.stringify(S.myDownloads)); }catch(e){}
  }
}

function dlFile(f, postTitle, postSubject){
  if(!f){ toast('📎 Fichier indisponible'); return; }
  // Fichier sur Supabase Storage → charger d'abord
  if(!f.dataUrl && f.url){
    toast('⏳ Chargement du fichier…');
    loadFileUrl(f, function(dataUrl){
      if(!dataUrl){ toast('❌ Fichier introuvable'); return; }
      f.dataUrl = dataUrl;
      dlFile(f); // relancer avec dataUrl chargée
    });
    return;
  }
  if(!f.dataUrl){ toast('📎 Fichier de démonstration'); return; }
  var ext = (f.name||'fichier').split('.').pop().toLowerCase();
  var isMedia = ['jpg','jpeg','png','gif','webp','svg'].indexOf(ext) > -1;
  if(!isMedia){
    // Fichier non-image : téléchargement direct
    _triggerDownload(f.dataUrl, f.name);
    toast('✅ Fichier téléchargé');
    return;
  }
  saveToMyDownloads(f, postTitle, postSubject);
  toast('⏳ Application du filigrane…');
  applyWatermark(f.dataUrl, f.name, function(finalUrl, watermarked){
    var dlName = watermarked
      ? f.name.replace(/\.[^.]+$/, '') + '_EduBoard.png'
      : f.name;
    _triggerDownload(finalUrl, dlName);
    toast(watermarked ? '✅ Téléchargé avec filigrane EduBoard' : '✅ Téléchargé');
  });
}

// Vérifier disponibilité du pseudo
function checkUsernameAvailable(username){
  return sbFetch('GET','accounts',null,'username=eq.'+encodeURIComponent(username)+'&limit=1')
    .then(function(res){ return !(Array.isArray(res) && res.length > 0); })
    .catch(function(){
      // Vérification locale en fallback
      return !Object.values(S.accounts).some(function(a){
        return (a.username||a.name).toLowerCase()===username.toLowerCase();
      });
    });
}

function doSetupNext(){
  var s=S.setup;

  if(s.step==='username'){
    if(!s.username||s.username.length<2){S.setup.usernameErr=true;draw();return;}
    if(s.usernameTaken){S.setup.usernameErr=true;draw();return;}
    if(!/^[a-zA-Z0-9_À-ÿ]{2,30}$/.test(s.username)){
      S.setup.usernameErr=true; draw();
      toast('⚠️ Pseudo invalide. Lettres, chiffres et _ uniquement.'); return;
    }
    // Vérification finale avant de passer
    checkUsernameAvailable(s.username).then(function(ok){
      if(!ok){S.setup.usernameTaken=true;S.setup.usernameErr=true;draw();return;}
      S.setup.step='role'; draw();
    });
    return;
  }

  if(s.step==='role'){
    if(s.role==='Professeur'){ S.setup.step='niveau'; S.setup.quizAns=''; S.setup.quizErr=false; draw(); return; }
    if(s.role==='Administration'){ S.setup.step='admincode'; S.setup.adminCode=''; S.setup.adminCodeErr=false; draw(); return; }
    S.setup.step='niveau'; draw(); return;
  }

  if(s.step==='niveau'){
    if(!s.niveau){ S.setup.niveauErr=true; draw(); toast('⚠️ Choisissez votre niveau'); return; }
    S.setup.niveauErr=false;
    // Prof → quiz, Élève → avatar
    if(s.role==='Professeur'){ S.setup.step='quiz'; S.setup.quizAns=''; S.setup.quizErr=false; }
    else { S.setup.step='avatar'; }
    draw(); return;
  }

  if(s.step==='quiz'){
    var qdata=getQuestion();
    if(!s.quizAns.trim()||!checkAnswer(s.quizAns,qdata.r)){
      S.setup.quizErr=true; draw();
      setTimeout(function(){S.setup.quizErr=false;draw();},2500); return;
    }
    S.setup.step='avatar'; S.setup.quizErr=false; draw(); return;
  }

  if(s.step==='admincode'){
    if(!s.adminCode.trim()){S.setup.adminCodeErr=true;draw();return;}
    checkAdminCode(s.adminCode).then(function(adminName){
      if(!adminName){
        S.setup.adminCodeErr=true; draw();
        setTimeout(function(){S.setup.adminCodeErr=false;draw();},2500); return;
      }
      S.setup.username=adminName;
      S.setup.step='avatar'; S.setup.adminCodeErr=false; draw();
    });
    return;
  }

  if(s.step==='avatar'){
    finaliseAccount();
  }
}

function finaliseAccount(){
  var s=S.setup;
  var gu=s.googleUser||{};
  var id='u_'+(gu.id||Date.now());
  var isAdminSignup=(s.role==='Administration');
  var avatarFinal=s.avatar||(gu.picture||null);
  var acc={
    id:id,
    name:s.username,
    username:s.username,
    email:gu.email||null,
    googleId:gu.id||null,
    role:isAdminSignup?'Administration':s.role,
    subject:s.subject,
    niveau:s.niveau||'',
    bio:s.bio,
    avatar:avatarFinal,
    color:isAdminSignup?'#18182E':s.color,
    ratings:[]
  };
  S.accounts[id]=acc; S.user=acc; saveUser();
  startPresence(); pingLocalPresence();
  if(isAdminSignup) toast('🛡️ Bienvenue Administrateur '+s.username+' !',3000);
  else toast('🎉 Bienvenue, '+s.username+' !');
  set({tab:'feed',view:null});
}

      if(Array.isArray(posts)&&posts.length>0){

  // Le redraw est déclenché par le bouton "🔍" ou Enter, pas à chaque frappe.

  var sb=h('div',{cls:'searchbar',style:{marginBottom:'13px'}});

    S.feedSearch=v;

    }));
  });
  wrap.appendChild(chips);

  // Zone liste (refreshable sans détruire le searchbar)
  var listWrap=h('div');
  wrap.appendChild(listWrap);
  refreshFeedList(listWrap);
  return wrap;
}

    if(last) rrt.appendChild(h('span',{style:{color:'#8888AA',fontSize:'10px'}},tx(last.time)));
    rr.appendChild(rrt); rc.appendChild(rr);

        tx('📩 '+pend.length+' demande'+(pend.length>1?'s':'')+' en attente')));
      pend.forEach(function(req){
        var rrow=h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px',background:'#fff',borderRadius:'10px',padding:'8px 10px',border:'1px solid #FFE066'}});
        rrow.appendChild(Avatar(S.accounts[req.userId]||{name:req.userName,color:'#F5C518'},30,11));
        var ri2=h('div',{style:{flex:1,minWidth:0}});
        ri2.appendChild(h('div',{style:{fontWeight:700,fontSize:'13px',color:'#18182E'}},tx(req.userName)));
        ri2.appendChild(h('div',{style:{color:'#8888AA',fontSize:'11px'}},tx((req.userRole||'Élève')+' • '+req.sentAt)));
        rrow.appendChild(ri2);
        var btns2=h('div',{style:{display:'flex',gap:'5px',flexShrink:0}});
        (function(r){
          btns2.appendChild(Btn('✅ Accepter',function(){
            var ri=S.rooms.findIndex(function(rm){return rm.id===live.id;});
            if(ri>=0){
              if(!S.rooms[ri].members.includes(r.userId)) S.rooms[ri].members.push(r.userId);
              S.rooms[ri].pendingRequests=(S.rooms[ri].pendingRequests||[]).filter(function(x){return x.userId!==r.userId;});
              saveRooms(); sbUpdateRoom(live.id,{members:S.rooms[ri].members,pending_requests:S.rooms[ri].pendingRequests});
              S.selRoom=S.rooms[ri];

          },{background:'#18C964',color:'#fff',borderRadius:'8px',padding:'5px 9px',fontSize:'11px',fontWeight:800}));
          btns2.appendChild(Btn('✗',function(){
            var ri=S.rooms.findIndex(function(rm){return rm.id===live.id;});

              saveRooms(); sbUpdateRoom(live.id,{pending_requests:S.rooms[ri].pendingRequests});
              S.selRoom=S.rooms[ri];
              toast('❌ Demande de '+r.userName+' refusée'); draw();
            }
          },{background:'#FFF0F2',color:'#E8284A',border:'1.5px solid #FFCCD5',borderRadius:'8px',padding:'5px 9px',fontSize:'11px',fontWeight:800}));

    em.appendChild(h('div',{},tx('Aucun message — soyez le premier !')));
    msgs.appendChild(em);
  }
  live.messages.forEach(function(msg,i){
    var isMe=msg.authorId===S.user.id;
    var sender=S.accounts[msg.authorId];
    var row=h('div',{cls:'msganim',style:{display:'flex',flexDirection:isMe?'row-reverse':'row',alignItems:'flex-end',gap:'7px',animationDelay:(i*.01)+'s'}});

    }},tx(msg.text)));

  var isMember = live.members.includes(S.user.id) || live.ownerId===S.user.id;

  if(!isMember){
    // Non-membre : bouton rejoindre à la place de la saisie
    var joinBar=h('div',{style:{background:'#fff',borderTop:'1.5px solid #E4E6F0',
      padding:'12px 16px calc(12px + env(safe-area-inset-bottom,0px))',flexShrink:0}});
    // L'admin peut superviser directement sans demande d'approbation
    var isMember = live.members.includes(S.user.id);
    if(isAdmin() && !isMember){
      var rIdxAdmin=S.rooms.findIndex(function(r){return r.id===live.id;});
      if(rIdxAdmin>=0 && !S.rooms[rIdxAdmin].members.includes(S.user.id)){
        S.rooms[rIdxAdmin].members.push(S.user.id);

        if(!S.rooms[rIdx].pendingRequests) S.rooms[rIdx].pendingRequests=[];
        S.rooms[rIdx].pendingRequests.push(req);
        saveRooms();
        sbUpdateRoom(live.id,{pending_requests:S.rooms[rIdx].pendingRequests});
        toast('📩 Demande envoyée ! Approbation requise.');
        draw();

      color:'#8888AA',fontSize:'12px',fontStyle:'italic',fontWeight:600

    // Membre : zone de saisie normale
    var ib=h('div',{style:{background:'#fff',borderTop:'1.5px solid #E4E6F0',
      padding:'11px 13px calc(11px + env(safe-area-inset-bottom,0px))',

      color:S.chatMsg&&S.chatMsg.trim()?'#fff':'#8888AA',
      border:'none',fontSize:'17px',display:'flex',alignItems:'center',justifyContent:'center',

      sendBtn.style.color=hasText?'#fff':'#8888AA';
    });
    ci.addEventListener('keydown',function(e){
      if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend(live,ci.value);}
    });
    sendBtn.addEventListener('click',function(){doSend(live,ci.value);});
    ib.appendChild(ci); ib.appendChild(sendBtn); wrap.appendChild(ib);
  }
  return wrap;
}

// Polling actif pour les messages du salon ouvert (filet de sécurité si WS lent)
var _msgPollInterval = null;
var _msgPollRoomId   = null;

function startMsgPolling(roomId){
  if(_msgPollRoomId === roomId) return; // déjà en cours
  stopMsgPolling();
  _msgPollRoomId = roomId;
  _msgPollInterval = setInterval(function(){
    if(!S.view || S.view !== 'roomview' || !S.selRoom) { stopMsgPolling(); return; }
    // Charger les nouveaux messages depuis Supabase
    var room = S.rooms.find(function(r){ return r.id === roomId; });
    if(!room) { stopMsgPolling(); return; }
    var lastId = room.messages.length > 0 ? room.messages[room.messages.length-1].id : '';
    sbFetch('GET','messages',null,
      'room_id=eq.'+roomId+'&order=created_at.asc&limit=50'
    ).then(function(msgs){
      if(!Array.isArray(msgs)) return;
      var rIdx = S.rooms.findIndex(function(r){ return r.id === roomId; });
      if(rIdx < 0) return;
      var have = new Set(S.rooms[rIdx].messages.map(function(m){ return m.id; }));
      var newMsgs = msgs.map(formatMessage).filter(function(m){ return !have.has(m.id); });
      if(newMsgs.length > 0){
        S.rooms[rIdx].messages = S.rooms[rIdx].messages.concat(newMsgs);
        if(S.selRoom && S.selRoom.id === roomId){
          S.selRoom = S.rooms[rIdx];
          draw(); setTimeout(scrollChat,50);
        }
      }
    }).catch(function(){});
  }, 3000); // toutes les 3 secondes
}

function stopMsgPolling(){
  if(_msgPollInterval){ clearInterval(_msgPollInterval); _msgPollInterval=null; }

}

function doSend(room,text){
  if(!text||!text.trim()) return;
  var msg={id:'m_'+Date.now()+'_'+S.user.id,authorId:S.user.id,authorName:S.user.name,text:text.trim(),time:nowT()};
  var idx=S.rooms.findIndex(function(r){return r.id===room.id;});
  if(idx>=0) S.rooms[idx].messages.push(msg);
  saveRooms();
  sbInsertMessage({
    id: msg.id,
    room_id: room.id,
    author_id: S.user.id,
    author_name: S.user.name,
    text: msg.text
  });
  S.chatMsg=''; S.selRoom=S.rooms[idx];
  draw(); setTimeout(scrollChat,50);
}

  if(myPosts.length){
    wrap.appendChild(SecT('Mes publications ('+myPosts.length+')'));

  return wrap;
}

// ── LISTE UTILISATEURS ADMIN ─────────────────────────
function refreshAdminUserList(container, allAccounts){
  container.innerHTML='';
  var q=(S._adminSearch||'').trim().toLowerCase();
  var list=allAccounts.slice().reverse();
  if(q) list=list.filter(function(a){
    return (a.name||'').toLowerCase().includes(q)||
           (a.username||'').toLowerCase().includes(q)||
           (a.email||'').toLowerCase().includes(q)||
           (a.role||'').toLowerCase().includes(q);
  });

  if(!list.length){
    container.appendChild(h('div',{cls:'empty'},
      h('div',{cls:'empty-icon'},'👤'),
      h('div',{style:{fontWeight:700,color:'#18182E'}},'Aucun résultat')
    ));
    return;
  }

  var rolePill={Élève:['#E6FFF2','#18C964'],Professeur:['#EFF6FF','#3B82F6'],Administration:['#FFF0F2','#E8284A']};
  list.forEach(function(a,i){
    var rp=rolePill[a.role]||['#F4F6FB','#8888AA'];
    var rc=h('div',{cls:'card fade',style:{
      padding:'11px 14px',marginBottom:'8px',
      display:'flex',alignItems:'center',gap:'10px',
      cursor:'pointer',animationDelay:(i*.03)+'s'
    }});
    rc.addEventListener('click',function(){
      // Admin peut voir le profil de n'importe quel utilisateur
      set({selProf:a, view:'profview'});
    });
    rc.appendChild(Avatar(a,38,15));
    var ri=h('div',{style:{flex:1,minWidth:0}});
    ri.appendChild(h('div',{style:{fontWeight:700,color:'#18182E',fontSize:'13px',
      overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},tx(a.name)));
    ri.appendChild(h('div',{style:{color:'#8888AA',fontSize:'11px',marginTop:'1px'}},
      tx((a.email||'')+(a.subject?' · '+a.subject:''))));
    rc.appendChild(ri);
    rc.appendChild(Pill(a.role,rp[0],rp[1],{fontSize:'10px',flexShrink:0}));
    rc.appendChild(h('span',{style:{color:'#8888AA',fontSize:'13px',marginLeft:'4px'}},'→'));
    container.appendChild(rc);
  });
}

function buildDownloads(){
  var wrap=h('div',{style:{padding:'14px 16px 110px',overflowY:'auto',flex:1,WebkitOverflowScrolling:'touch'}});

  // En-tête
  var hd=h('div',{style:{marginBottom:'14px'}});
  var hdRow=h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'3px'}});
  hdRow.appendChild(h('div',{style:{fontFamily:'Georgia,serif',fontSize:'20px',fontWeight:900,color:'#18182E'}},'Mes téléchargements 📥'));
  if(S.myDownloads&&S.myDownloads.length>0){
    var clearBtn=Btn('🗑️',function(){
      if(confirm('Effacer tout l\u2019historique des t\u00e9l\u00e9chargements ?')){
        S.myDownloads=[];
        try{localStorage.removeItem('eb_mydownloads');}catch(e){}
        draw();
      }
    },{background:'#FFF0F2',color:'#E8284A',border:'1.5px solid #FFCCD5',borderRadius:'10px',padding:'6px 11px',fontSize:'13px'});
    hdRow.appendChild(clearBtn);
  }
  hd.appendChild(hdRow);
  hd.appendChild(h('div',{style:{color:'#8888AA',fontSize:'12px'}},'Fichiers et documents que vous avez téléchargés'));
  wrap.appendChild(hd);

  var dls=S.myDownloads||[];

  if(!dls.length){
    var em=h('div',{cls:'empty'});
    em.appendChild(h('div',{cls:'empty-icon'},'📭'));
    em.appendChild(h('div',{style:{fontWeight:700,color:'#18182E',fontSize:'15px',marginBottom:'6px'}},'Aucun téléchargement'));
    em.appendChild(h('div',{style:{color:'#8888AA',fontSize:'13px',textAlign:'center'}},'Les fichiers que vous téléchargez depuis les publications apparaîtront ici automatiquement.'));
    wrap.appendChild(em);
    return wrap;
  }

  // Statistiques rapides
  var statsRow=h('div',{style:{display:'flex',gap:'8px',marginBottom:'16px'}});
  var statItems=[
    {lb:'Total',val:dls.length,bg:'#EFF6FF',c:'#3B82F6'},
    {lb:'Images',val:dls.filter(function(d){var e=(d.name||'').split('.').pop().toLowerCase();return ['jpg','jpeg','png','gif','webp','svg'].indexOf(e)>-1;}).length,bg:'#FFF0F2',c:'#E8284A'},
    {lb:'Docs',val:dls.filter(function(d){var e=(d.name||'').split('.').pop().toLowerCase();return ['jpg','jpeg','png','gif','webp','svg'].indexOf(e)===-1;}).length,bg:'#F0FFF4',c:'#18C964'},
  ];
  statItems.forEach(function(si){
    var sc=h('div',{style:{flex:1,background:si.bg,borderRadius:'12px',padding:'10px 6px',textAlign:'center'}});
    sc.appendChild(h('div',{style:{fontSize:'20px',fontWeight:900,color:si.c}},''+si.val));
    sc.appendChild(h('div',{style:{fontSize:'10px',color:si.c,fontWeight:700,marginTop:'2px'}},''+si.lb));
    statsRow.appendChild(sc);
  });
  wrap.appendChild(statsRow);

  // Liste des téléchargements
  var IMGEXTS=['jpg','jpeg','png','gif','webp','svg'];
  dls.forEach(function(item){
    var ext=(item.name||'').split('.').pop().toLowerCase();
    var isImg=IMGEXTS.indexOf(ext)>-1;
    var pac=acOf(item.postSubject||'');

    var card=h('div',{cls:'card',style:{padding:'12px 14px',display:'flex',alignItems:'center',gap:'12px',marginBottom:'8px'}});

    // Miniature image ou icône document
    var thumb=h('div',{style:{width:'52px',height:'52px',borderRadius:'11px',overflow:'hidden',background:'#F4F6FB',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'24px'}});
    if(isImg&&(item.dataUrl||item.url)){
      var timg=h('img',{src:item.dataUrl||item.url,alt:item.name,style:{width:'100%',height:'100%',objectFit:'cover',display:'block'}});
      thumb.appendChild(timg);
      thumb.style.fontSize='0';
    } else {
      thumb.appendChild(tx(fileIco(item.name)));
    }
    card.appendChild(thumb);

    // Infos
    var info=h('div',{style:{flex:1,minWidth:0}});
    info.appendChild(h('div',{style:{color:'#18182E',fontSize:'13px',fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},tx(item.name)));
    var meta=h('div',{style:{display:'flex',gap:'5px',alignItems:'center',marginTop:'3px',flexWrap:'wrap'}});
    if(item.postSubject) meta.appendChild(h('span',{style:{color:pac,background:pac+'15',borderRadius:'5px',padding:'1px 6px',fontSize:'10px',fontWeight:700}},tx(item.postSubject)));
    if(item.size) meta.appendChild(h('span',{style:{color:'#8888AA',fontSize:'11px'}},tx(item.size)));
    info.appendChild(meta);
    if(item.postTitle) info.appendChild(h('div',{style:{color:'#8888AA',fontSize:'11px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginTop:'2px'}},tx('📄 '+item.postTitle)));
    if(item.savedAt) info.appendChild(h('div',{style:{color:'#BBBBCC',fontSize:'10px',marginTop:'2px'}},tx('⬇ '+item.savedAt)));
    card.appendChild(info);

    // Actions
    var actCol=h('div',{style:{display:'flex',flexDirection:'column',gap:'5px',flexShrink:0}});
    // Re-télécharger
    if(item.dataUrl||item.url){
      var rdl=Btn('⬇',function(){
        dlFile({name:item.name,size:item.size,dataUrl:item.dataUrl,url:item.url}, item.postTitle, item.postSubject);
      },{background:'#18C964',color:'#fff',borderRadius:'9px',padding:'7px 10px',fontSize:'13px',fontWeight:900});
      actCol.appendChild(rdl);
    }
    // Supprimer de la liste
    var del=Btn('✕',function(){
      S.myDownloads=S.myDownloads.filter(function(d){return d.id!==item.id;});
      try{localStorage.setItem('eb_mydownloads',JSON.stringify(S.myDownloads));}catch(e){}
      draw();
    },{background:'#FFF0F2',color:'#E8284A',borderRadius:'9px',padding:'7px 10px',fontSize:'12px',fontWeight:700});
    actCol.appendChild(del);
    card.appendChild(actCol);
    wrap.appendChild(card);
  });

  return wrap;
}


function buildMemberProfile(){
  var m=S.selMember;
  if(!m) return h('div');
  var uc=m.color||'#3B82F6';
  var wrap=h('div',{cls:'popin',style:{padding:'0 0 110px',overflowY:'auto',flex:1}});

  // Hero banner
  var hero=h('div',{style:{position:'relative',marginBottom:'0'}});
  hero.appendChild(h('div',{style:{height:'110px',background:'linear-gradient(135deg,'+uc+','+uc+'88)'}}));
  var avBox=h('div',{style:{position:'absolute',bottom:'-36px',left:'18px'}});
  var avEl=Avatar(m,72,28);
  avEl.style.border='4px solid #fff';
  avEl.style.boxShadow='0 4px 18px rgba(0,0,0,.12)';
  avBox.appendChild(avEl);
  hero.appendChild(avBox);
  wrap.appendChild(hero);

  var info=h('div',{style:{padding:'46px 18px 16px'}});
  info.appendChild(h('div',{style:{fontFamily:'Georgia,serif',fontSize:'22px',fontWeight:900,color:'#18182E',marginBottom:'5px'}},tx(m.name)));
  var pills=h('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'10px'}});
  pills.appendChild(Pill(m.role,uc+'20',uc));
  if(m.subject) pills.appendChild(Pill(m.subject,'#E4E6F0','#8888AA'));
  info.appendChild(pills);
  if(m.bio) info.appendChild(h('div',{style:{color:'#3D3D5C',fontSize:'13.5px',lineHeight:'1.7',marginTop:'8px',padding:'12px',background:'#F4F6FB',borderRadius:'12px'}},tx(m.bio)));
  wrap.appendChild(info);

  // Salons en commun
  var sharedRooms=S.rooms.filter(function(r){
    return r.members&&r.members.includes(m.id)&&S.user&&(r.members.includes(S.user.id)||r.ownerId===S.user.id);
  });
  if(sharedRooms.length){
    var sec=h('div',{style:{padding:'0 18px 16px'}});
    sec.appendChild(h('div',{style:{color:'#8888AA',fontSize:'11px',fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',marginBottom:'10px'}},tx('Salons en commun ('+sharedRooms.length+')')));
    sharedRooms.forEach(function(room){
      var rc=h('div',{cls:'card',style:{padding:'11px 13px',display:'flex',alignItems:'center',gap:'11px',marginBottom:'8px',cursor:'pointer'}});
      rc.addEventListener('click',function(){set({selRoom:room,view:'roomview'});});
      rc.appendChild(h('div',{style:{width:'40px',height:'40px',borderRadius:'12px',background:'rgba(59,130,246,.1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'20px',flexShrink:0}},tx(room.emoji||'💬')));
      var ri=h('div',{style:{flex:1}});
      ri.appendChild(h('div',{style:{fontWeight:700,color:'#18182E',fontSize:'14px'}},tx(room.name)));
      if(room.desc) ri.appendChild(h('div',{style:{color:'#8888AA',fontSize:'12px'}},tx(room.desc)));
      rc.appendChild(ri);
      rc.appendChild(h('span',{style:{color:'#E8284A',fontSize:'13px',fontWeight:700}},'→'));
      sec.appendChild(rc);
    });
    wrap.appendChild(sec);
  }

  // Publications (si prof)
  var theirPosts=S.posts.filter(function(p){return p.authorId===m.id;});
  if(theirPosts.length){
    var sec2=h('div',{style:{padding:'0 18px'}});
    sec2.appendChild(h('div',{style:{color:'#8888AA',fontSize:'11px',fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',marginBottom:'10px'}},tx('Publications ('+theirPosts.length+')')));
    theirPosts.slice(0,5).forEach(function(post,i){
      var pac=acOf(post.subject);
      var pc=h('div',{cls:'card fade',style:{padding:'12px 14px',marginBottom:'8px',cursor:'pointer',animationDelay:(i*.04)+'s'}});
      pc.addEventListener('click',function(){set({selPost:post,view:'detail'});});
      pc.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'4px'}},
        Pill((TYPE_ICO[post.type]||'📄')+' '+post.type,pac+'18',pac),
        h('span',{style:{color:'#8888AA',fontSize:'11px'}},tx(post.createdAt))
      ));
      pc.appendChild(h('div',{style:{fontWeight:700,color:'#18182E',fontSize:'14px'}},tx(post.title)));
      sec2.appendChild(pc);
    });
    wrap.appendChild(sec2);
  }
  return wrap;
}

// ════════════════════════════════════════════════════
//  DRAW PRINCIPAL
// ════════════════════════════════════════════════════
function draw(){
  var root=document.getElementById('app');
  if(!root) return; // sécurité DOM
  root.innerHTML='';

  try {
    // Pas encore connecté Google → écran login
    if(!S.user && (!S.setup || !S.setup.googleUser)){
      root.appendChild(buildLogin());
      return;
    }

    // Connecté Google mais pas encore de compte → setup
    if(!S.user && S.setup && S.setup.googleUser){
      var card=h('div',{style:{background:'#fff',flex:1,overflowY:'auto',display:'flex',flexDirection:'column'}});
      card.appendChild(buildSetup());
      root.appendChild(card);
      return;
    }
  } catch(err) {
    // Si buildLogin ou buildSetup plante, afficher un message
    root.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:16px;font-family:sans-serif;padding:24px;text-align:center"><div style="font-size:48px">🎓</div><div style="font-size:20px;font-weight:800;color:#18182E">EduBoard</div><div style="color:#8888AA;font-size:13px">Chargement...</div><button onclick="window.location.reload()" style="margin-top:16px;background:#E8284A;color:#fff;border:none;border-radius:12px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer">Recharger</button></div>';
    return;
  }

  root.appendChild(buildTopBar());
  var body=h('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}});

  if(S.view==='detail')           body.appendChild(buildDetail());
  else if(S.view==='profview')    body.appendChild(buildProfView());
  else if(S.view==='memberprofile') body.appendChild(buildMemberProfile());
  else if(S.view==='editprofile') body.appendChild(buildEditProfile());
  else if(S.view==='roomview'){   body.appendChild(buildRoomChat());
    // Démarrer le polling de messages pour ce salon
    if(S.selRoom) startMsgPolling(S.selRoom.id);
  }
  else if(S.view==='createroom')  body.appendChild(buildCreateRoom());
  else if(S.tab==='feed')         body.appendChild(buildFeed());
  else if(S.tab==='chat')         body.appendChild(buildChat());
  else if(S.tab==='teachers')     body.appendChild(buildTeachers());
  else if(S.tab==='profile')      body.appendChild(buildProfile());
  else if(S.tab==='create')       body.appendChild(buildCreate());
  else if(S.tab==='downloads')    body.appendChild(buildDownloads());

  root.appendChild(body);
  if(!S.view) root.appendChild(buildNav());
}

// Bouton retour Android
document.addEventListener('backbutton',function(e){
  e.preventDefault();
  if(S.view==='roomview') stopMsgPolling();
  if(S.view) set({view:null,selPost:null,selProf:null,selRoom:null,selMember:null});

},false);

// ── Splash screen ────────────────────────────────────
function hideSplash(){
  var sp=document.getElementById('splash');
  if(!sp) return;
  // Suppression immédiate sans animation si ça dure trop longtemps
  sp.style.transition='opacity .4s';
  sp.style.opacity='0';
  setTimeout(function(){
    var s=document.getElementById('splash');
    if(s) s.remove();
  }, 450);
}

// ── Fonctionnement en arrière-plan ───────────────────
(function(){
  // Page Visibility API — détecte quand l'app passe en arrière-plan
  var hidden = typeof document.hidden !== 'undefined' ? 'hidden' :
               typeof document.webkitHidden !== 'undefined' ? 'webkitHidden' : null;
  var visEvent = hidden === 'hidden' ? 'visibilitychange' : 'webkitvisibilitychange';

  if(hidden){
    document.addEventListener(visEvent, function(){
      if(document[hidden]){
        // App en arrière-plan
        console.log('[EduBoard] App en arrière-plan');
        // Enregistrer un Background Sync pour vérifier les messages
        if('serviceWorker' in navigator && navigator.serviceWorker.controller){
          navigator.serviceWorker.ready.then(function(reg){
            if('sync' in reg){
              reg.sync.register('sync-messages').catch(function(){});
            }
          });
        }
      } else {
        // App revenue au premier plan — rafraîchir
        console.log('[EduBoard] App revenue au premier plan');
        // Remettre à zéro le badge de l'app si possible
        if(navigator.clearAppBadge) navigator.clearAppBadge().catch(function(){});
        // Redessiner pour avoir les données les plus récentes
        if(typeof draw === 'function') draw();
      }
    });
  }

  // Badge de l'application (Android/iOS)
  function updateAppBadge(count){
    if(navigator.setAppBadge){
      if(count > 0) navigator.setAppBadge(count).catch(function(){});
      else navigator.clearAppBadge().catch(function(){});
    }
  }

  // Surveiller S.notifBadge et mettre à jour le badge de l'app
  var _prevBadge = 0;
  setInterval(function(){
    if(typeof S !== 'undefined' && S.notifBadge !== _prevBadge){
      _prevBadge = S.notifBadge;
      updateAppBadge(S.notifBadge);
    }
  }, 2000);

  // Wake Lock — empêcher l'écran de s'éteindre lors d'un TP ou contrôle
  var _wakeLock = null;
  window.requestWakeLock = function(){
    if('wakeLock' in navigator){
      navigator.wakeLock.request('screen').then(function(lock){
        _wakeLock = lock;
        console.log('[EduBoard] Wake Lock actif');
        lock.addEventListener('release', function(){
          _wakeLock = null;
        });
      }).catch(function(){});
    }
  };
  window.releaseWakeLock = function(){
    if(_wakeLock){ _wakeLock.release(); _wakeLock = null; }
  };
  // Réactiver le Wake Lock si perdu (ex: changement d'onglet)
  document.addEventListener(visEvent, function(){
    if(_wakeLock !== null && !document[hidden]){
      window.requestWakeLock();
    }
  });
})();

// ── Bannière d'installation PWA ──────────────────────
var _deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();
  _deferredPrompt=e;
  setTimeout(function(){
    var b=document.getElementById('install-banner');
    if(b) b.classList.add('show');
  },2500);
});
window.addEventListener('appinstalled',function(){
  var b=document.getElementById('install-banner');
  if(b) b.classList.remove('show');
  _deferredPrompt=null;
  toast('✅ EduBoard installé sur votre écran d\'accueil !',3500);
});
document.addEventListener('DOMContentLoaded',function(){
  var btn=document.getElementById('install-btn');
  var close=document.getElementById('install-close');
  if(btn) btn.addEventListener('click',function(){
    var b=document.getElementById('install-banner');
    if(b) b.classList.remove('show');
    if(_deferredPrompt){
      _deferredPrompt.prompt();
      _deferredPrompt.userChoice.then(function(){_deferredPrompt=null;});
    }
  });
  if(close) close.addEventListener('click',function(){
    var b=document.getElementById('install-banner');
    if(b) b.classList.remove('show');
  });
});

// ── Minuteur de rafraîchissement de la question prof ─
setInterval(function(){
  if(typeof S !== 'undefined' && S.setup && S.setup.step===15 && !S.user) draw();
}, 30000);

// ══════════════════════════════════════════════════════
//  DÉMARRAGE PROPRE
// ══════════════════════════════════════════════════════

var _booted = false;
function bootApp(){
  // ── Guard : ne charger les données locales qu'une seule fois ──
  if(!_booted){
    _booted = true;
    // Charger depuis localStorage sans attendre Supabase
    var cachedPosts = ls(KS.po);
  var cachedRooms = ls(KS.ro);
  var cachedAccs  = ls(KS.ac);
  if(Array.isArray(cachedPosts) && cachedPosts.length > 0) S.posts = cachedPosts;
  if(Array.isArray(cachedRooms) && cachedRooms.length > 0) S.rooms = cachedRooms;
  if(cachedAccs && typeof cachedAccs === 'object') S.accounts = cachedAccs;

  // Si aucune donnée locale → utiliser les données de démo embarquées
  if(!S.posts || S.posts.length === 0){
    S.posts = (typeof SEED_POSTS !== 'undefined') ? SEED_POSTS.map(function(p){ return p; }) : [];
  }
  if(!S.rooms || S.rooms.length === 0){
    S.rooms = (typeof SEED_ROOMS !== 'undefined') ? SEED_ROOMS : [];
  }

  // Mettre à jour le message splash selon la source
  var _splashStatus = document.getElementById('splash-status');
  if(_splashStatus){
    var isLocalBoot = window.location.protocol==='content:'||
                      window.location.protocol==='file:'||
                      window.location.hostname==='';
    _splashStatus.textContent = isLocalBoot ? 'Mode hors-ligne' : 'Prêt !';
  }

  } // fin if(!_booted)

  _loaded = true;
  try { draw(); } catch(e){ console.error('draw error:', e); }

  // ── Cacher le splash immédiatement ──
  setTimeout(function(){ hideSplash(); }, 50);

  // ── Étape 3 : Synchroniser Supabase en arrière-plan ──
  // (ne bloque plus le démarrage)
  setTimeout(function(){
    loadFromSupabase();
  }, 800);

  setTimeout(function(){
    if(S && S.user){ startPresence(); pingLocalPresence(); }
  }, 2500);
}

// ── DÉMARRAGE ────────────────────────────────────────
// 1. L'app démarre immédiatement avec les données locales
bootApp();

// 2. Connexion Supabase en arrière-plan (ne bloque pas l'UI)
function _connectSupabase() {
  getSupabase().then(function(sb) {
    if (!sb) { return; }

    sb.auth.getSession().then(function(result) {
      var session = result.data && result.data.session;

      if (session && session.user) {
        var u    = session.user;
        var meta = u.user_metadata || {};
        var googleUser = {
          id:      u.id,
          email:   u.email,
          name:    meta.full_name || meta.name || u.email,
          picture: meta.avatar_url || meta.picture || null
        };

        sbFetch('GET', 'accounts', null, 'google_id=eq.' + encodeURIComponent(u.id) + '&limit=1')
          .then(function(res) {
            if (Array.isArray(res) && res.length > 0) {
              var acc = res[0];
              S.user = {
                id:       acc.id,
                name:     acc.username || acc.name,
                username: acc.username || acc.name,
                email:    acc.email || googleUser.email,
                googleId: acc.google_id,
                role:     acc.role || 'Élève',
                subject:  acc.subject || '',
                bio:      acc.bio || '',
                avatar:   acc.avatar || googleUser.picture,
                color:    acc.color || '#3B82F6',
                ratings:  acc.ratings || []
              };
              S.accounts[S.user.id] = S.user;
              saveUser();
              bootApp();
            } else {
              S.setup = S.setup || {};
              S.setup.googleUser = googleUser;
              S.setup.step = 'username';
              bootApp();
            }
          })
          .catch(function() { bootApp(); });

      } else {
        bootApp();
      }

    }).catch(function() { bootApp(); });

    sb.auth.onAuthStateChange(function(event) {
      if (event === 'SIGNED_OUT') {
        S.user = null; resetSetup(); draw();
      }
    });

  }).catch(function() {
    // Supabase non disponible — app déjà démarrée
  });
}

setTimeout(_connectSupabase, 200);
// Nettoyage propre quand l'utilisateur quitte la page
window.addEventListener('beforeunload', function(){
  if(typeof S === 'undefined' || !S.user) return;
  // Supprimer la session locale
  try {
    var sessions = JSON.parse(localStorage.getItem('eb_sessions')||'{}');
    var key = getLocalOnlineKey();
    delete sessions[key];
    localStorage.setItem('eb_sessions', JSON.stringify(sessions));
  } catch(e){}
  // Fermer les WebSockets proprement
  if(_presenceWs) _presenceWs.close();
  if(_realtimeWs) _realtimeWs.close();
});
