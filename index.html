<style>
:root{
  --red:#E8284A;--redL:#FFF0F2;--redM:#F95C73;
  --yellow:#F5C518;--yellowL:#FFFBEA;--yellowM:#FFE066;
  --green:#18C964;--greenL:#E6FFF2;--greenM:#5DDBA5;
  --blue:#3B82F6;--blueL:#EFF6FF;
  --ink:#18182E;--ink2:#3D3D5C;--muted:#8888AA;
  --bg:#F4F6FB;--white:#fff;--border:#E4E6F0;
  --shadow:rgba(24,24,46,0.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#D8DBE6}
#app{height:100%;max-width:500px;margin:0 auto;display:flex;flex-direction:column;background:var(--bg);box-shadow:0 0 40px rgba(0,0,0,.12);overflow:hidden;padding-top:env(safe-area-inset-top,0px)}

/* ── Inputs : jamais de redraw au keystroke ── */
input,textarea,select{font-family:inherit;-webkit-appearance:none;appearance:none;outline:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;-webkit-tap-highlight-color:transparent}
button:active{opacity:.75;transform:scale(.96)}
::-webkit-scrollbar{display:none}

.card{background:var(--white);border-radius:18px;border:1.5px solid var(--border);box-shadow:0 2px 14px var(--shadow);transition:box-shadow .2s}
.card:active{box-shadow:0 1px 4px var(--shadow)}
.inp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:11px 14px;color:var(--ink);font-size:15px;font-family:inherit;display:block;transition:border-color .15s,background .15s,box-shadow .15s}
.inp:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.inp.err{border-color:var(--red)!important;box-shadow:0 0 0 3px rgba(232,40,74,.1)!important}
.pill{display:inline-flex;align-items:center;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;white-space:nowrap}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes msgIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.fade{animation:fadeUp .26s ease both}
.popin{animation:pop .2s ease}
.msganim{animation:msgIn .16s ease}

/* Toast */
#toast{position:fixed;bottom:calc(86px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(16px);background:#18182E;color:#fff;padding:10px 20px;border-radius:22px;font-size:13px;font-weight:700;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:9999;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Search */
.searchbar{position:relative}
.searchbar input{padding-left:38px!important}
.searchbar::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;z-index:1}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:10px;color:var(--muted);font-size:14px;text-align:center}
.empty-icon{font-size:46px}

/* ── Bannière d'installation PWA ── */
#install-banner{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:500px;background:#fff;border-top:1.5px solid #E4E6F0;padding:14px 18px calc(14px + env(safe-area-inset-bottom,0px));display:flex;align-items:center;gap:12px;z-index:10000;transition:transform .35s cubic-bezier(.4,0,.2,1);box-shadow:0 -4px 24px rgba(0,0,0,.10)}
#install-banner.show{transform:translateX(-50%) translateY(0)}
#install-banner .ib-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#E8284A,#F5C518);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
#install-banner .ib-text{flex:1}
#install-banner .ib-title{font-weight:800;font-size:14px;color:#18182E}
#install-banner .ib-sub{font-size:12px;color:#8888AA;margin-top:2px}
#install-banner .ib-btn{background:#E8284A;color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;font-family:inherit}
#install-banner .ib-close{background:none;border:none;color:#8888AA;font-size:20px;cursor:pointer;padding:4px;line-height:1;font-family:inherit}

/* ── Splash screen ── */
#splash{position:fixed;inset:0;background:linear-gradient(160deg,#E8284A,#F5C518);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .5s,transform .5s}
#splash.hide{opacity:0;transform:scale(1.06);pointer-events:none}
#splash .sp-icon{font-size:90px;margin-bottom:16px;filter:drop-shadow(0 8px 24px rgba(0,0,0,.2))}
#splash .sp-title{font-family:Georgia,serif;font-size:42px;font-weight:900;color:#fff;letter-spacing:-1.5px}
#splash .sp-sub{color:rgba(255,255,255,.8);font-size:15px;margin-top:8px}
#splash .sp-loader{width:48px;height:4px;background:rgba(255,255,255,.3);border-radius:4px;margin-top:40px;overflow:hidden}
#splash .sp-bar{height:100%;background:#fff;border-radius:4px;animation:loadBar 1.4s ease forwards}
@keyframes loadBar{from{width:0}to{width:100%}}
@keyframes ping{0%{transform:scale(1);opacity:.4}70%{transform:scale(2.2);opacity:0}100%{transform:scale(2.2);opacity:0}}
/* ── Lightbox visionneuse d'images ── */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:99998;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s}
#lightbox.open{opacity:1;pointer-events:all}
#lightbox img{max-width:92vw;max-height:82vh;border-radius:14px;object-fit:contain;box-shadow:0 8px 60px rgba(0,0,0,.6);transform:scale(.94);transition:transform .22s}
#lightbox.open img{transform:scale(1)}
#lightbox-close{position:absolute;top:calc(18px + env(safe-area-inset-top,0px));right:18px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#lightbox-nav{position:absolute;bottom:calc(28px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);display:flex;gap:10px;align-items:center}
#lightbox-prev,#lightbox-next{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:20px;cursor:pointer;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#lightbox-counter{color:rgba(255,255,255,.8);font-size:13px;font-weight:700;min-width:48px;text-align:center}

</style>
</head>
<body>
<div id="splash">
  <div class="sp-icon">🎓</div>
  <div class="sp-title">EduBoard</div>
  <div class="sp-sub">Devoirs · Exercices · Discussions</div>
  <div class="sp-loader"><div class="sp-bar"></div></div>
  <div style="color:rgba(255,255,255,.4);font-size:11px;margin-top:18px;font-weight:600">Connexion en cours…</div>
</div>

<div id="app"></div>
<div id="toast"></div>
<div id="install-banner">
  <div class="ib-icon">🎓</div>
  <div class="ib-text">
    <div class="ib-title">Installer EduBoard</div>
    <div class="ib-sub">Ajouter à l'écran d'accueil</div>
  </div>
  <button class="ib-btn" id="install-btn">Installer</button>
  <button class="ib-close" id="install-close">✕</button>
</div>
<div id="lightbox">
  <button id="lightbox-close">✕</button>
  <img id="lightbox-img" src="" alt=""/>
  <div id="lightbox-nav">
    <button id="lightbox-prev">‹</button>
    <span id="lightbox-counter">1/1</span>
    <button id="lightbox-next">›</button>
  </div>

function toast(msg, ms) {
  var t = document.getElementById('toast');

  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.classList.remove('show'); }, ms||2200);
}

// ── Temps réel via Supabase Realtime (WebSocket) ─────
var _lbImages=[];
var _lbIdx=0;
var _realtimeWs = null;
var _presenceWs = null;       // WebSocket dédié au Presence
var _onlineUsers = {};        // { userId: {name, role, lastSeen} }
var _myPresenceKey = null;    // Clé unique de cette session

// ── Heartbeat Presence (ping toutes les 20s) ──────────
var _presenceInterval = null;

function startPresence(){
  if(typeof S === 'undefined' || !S.user) return;
  if(_presenceWs) return;
  _myPresenceKey = S.user.id + '_' + Date.now();

  var wsUrl = SB_URL.replace('https://','wss://') + '/realtime/v1/websocket?apikey=' + SB_KEY + '&vsn=1.0.0';
  try {
    _presenceWs = new WebSocket(wsUrl);
    _presenceWs.onopen = function(){
      // Rejoindre le canal Presence
      _presenceWs.send(JSON.stringify({
        topic: 'realtime:presence',
        event: 'phx_join',
        payload: {
          config: { presence: { key: _myPresenceKey } }
        },
        ref: 'presence'
      }));
      // Annoncer sa présence
      setTimeout(function(){ broadcastPresence(); }, 500);
      // Heartbeat toutes les 20 secondes
      _presenceInterval = setInterval(broadcastPresence, 20000);
    };
    _presenceWs.onmessage = function(e){
      try {
        var msg = JSON.parse(e.data);
        // Répondre aux heartbeat du serveur
        if(msg.event === 'phx_reply' && msg.payload && msg.payload.status === 'ok') return;
        if(msg.event === 'heartbeat'){
          _presenceWs.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:'hb'}));
          return;
        }
        // Mise à jour de la liste des présents
        if(msg.event === 'presence_state' || msg.event === 'presence_diff'){
          updateOnlineUsers(msg.payload);
        }
      } catch(err){}
    };
    _presenceWs.onclose = function(){
      clearInterval(_presenceInterval);
      _presenceWs = null;
      setTimeout(startPresence, 5000);
    };
    _presenceWs.onerror = function(){};
  } catch(e){}
}

function broadcastPresence(){
  if(typeof S === 'undefined' || !S.user) return;
  if(!_presenceWs || _presenceWs.readyState !== 1) return;
  _presenceWs.send(JSON.stringify({
    topic: 'realtime:presence',
    event: 'presence',
    payload: {
      type: 'broadcast',
      event: 'online',
      payload: {
        key: _myPresenceKey,
        userId: S.user.id,
        name: S.user.name,
        role: S.user.role,
        ts: Date.now()
      }
    },
    ref: 'bc'
  }));
}

function updateOnlineUsers(payload){
  if(!payload) return;
  // Traiter presence_state (état complet) et presence_diff (arrivées/départs)
  var now = Date.now();
  var changed = false;

  // Ajouter/mettre à jour
  var joins = payload.joins || payload;
  if(joins && typeof joins === 'object'){
    Object.keys(joins).forEach(function(k){
      var u = joins[k];
      var metas = (u.metas || [u])[0] || {};
      if(metas.userId){
        _onlineUsers[metas.key || k] = {
          userId: metas.userId, name: metas.name,
          role: metas.role, ts: metas.ts || now
        };
        changed = true;
      }
    });
  }
  // Retirer les partants
  var leaves = payload.leaves;
  if(leaves && typeof leaves === 'object'){
    Object.keys(leaves).forEach(function(k){
      delete _onlineUsers[k];
      changed = true;
    });
  }
  // Nettoyer les sessions inactives (> 45s sans ping)
  Object.keys(_onlineUsers).forEach(function(k){
    if(now - (_onlineUsers[k].ts||0) > 45000){
      delete _onlineUsers[k]; changed = true;
    }
  });

  if(changed && typeof S !== 'undefined' && isAdmin() && S.tab==='profile' && !S.view) draw();
}

// Fallback simple : compter via localStorage les onglets actifs
// (fonctionne même si Presence WebSocket échoue)
var _localOnlineKey = null; // calculé au premier appel, après que S soit défini
function getLocalOnlineKey(){
  if(!_localOnlineKey) _localOnlineKey = 'eb_online_' + (S && S.user ? S.user.id : 'anon_'+Date.now());
  return _localOnlineKey;
}
function pingLocalPresence(){
  if(!S || !S.user) return {};
  var key = getLocalOnlineKey();
  var sessions = {};
  try { sessions = JSON.parse(localStorage.getItem('eb_sessions')||'{}'); } catch(e){}
  sessions[key] = {
    name: S.user.name, role: S.user.role, ts: Date.now()
  };
  // Nettoyer les sessions mortes (> 45s)
  var now = Date.now();
  Object.keys(sessions).forEach(function(k){
    if(now - (sessions[k].ts||0) > 45000) delete sessions[k];
  });
  localStorage.setItem('eb_sessions', JSON.stringify(sessions));
  return sessions;
}

function getOnlineCount(){
  var wsUsers = Object.values(_onlineUsers);
  var now = Date.now();
  // Nettoyer les sessions expirées
  wsUsers = wsUsers.filter(function(u){ return now-(u.ts||0)<45000; });
  if(wsUsers.length > 0) return { count: wsUsers.length, users: wsUsers };
  // Fallback local
  var sessions = pingLocalPresence() || {};
  var active = Object.values(sessions).filter(function(s){ return now-(s.ts||0)<45000; });
  // Toujours inclure l'utilisateur courant
  if(S && S.user && !active.find(function(a){ return a.name===S.user.name; })){
    active.unshift({name:S.user.name, role:S.user.role, ts:now});
  }
  return { count: active.length, users: active };
}

// Ping local toutes les 10s pour un compteur en ligne plus précis
setInterval(function(){
  if(typeof S === 'undefined' || !S.user) return;
  pingLocalPresence();
  // Rafraîchir le panneau admin si ouvert

}, 10000);

function startRealtime(){
  if(_realtimeWs) return;
  var wsUrl = SB_URL.replace('https://','wss://') + '/realtime/v1/websocket?apikey=' + SB_KEY + '&vsn=1.0.0';
  try {
    _realtimeWs = new WebSocket(wsUrl);
    _realtimeWs.onopen = function(){
      // Heartbeat immédiat
      _realtimeWs.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:'hb_init'}));
      // S'abonner aux changements sur posts, messages, rooms et accounts
      ['posts','messages','rooms','accounts'].forEach(function(table){
        _realtimeWs.send(JSON.stringify({
          topic: 'realtime:public:'+table,
          event: 'phx_join',
          payload: {
            config: { broadcast: { self: false }, presence: { key: '' } }
          },
          ref: table
        }));
      });
    };
    // Heartbeat toutes les 25s pour maintenir la connexion active
    var _wsHeartbeat = setInterval(function(){
      if(_realtimeWs && _realtimeWs.readyState===1){
        _realtimeWs.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:'hb'}));
      } else {
        clearInterval(_wsHeartbeat);
      }
    }, 25000);
    _realtimeWs.onmessage = function(e){
      try {
        var msg = JSON.parse(e.data);
        var payload = msg.payload;
        if(!payload || !payload.type) return;
        var rec = payload.record || payload.old_record;
        var table = (msg.topic||'').split(':')[2];

        if(table==='accounts'){
          if(payload.type==='INSERT'||payload.type==='UPDATE'){
            S.accounts[rec.id]={
              id:rec.id, name:rec.name, role:rec.role,
              subject:rec.subject||'Maths', bio:rec.bio||'',
              avatar:rec.avatar||null, color:rec.color||'#3B82F6',
              ratings:rec.ratings||[]
            };
            // Actualiser le profil admin si ouvert
            if(S.tab==='profile'&&!S.view&&isAdmin()) draw();
          }
        }
        if(table==='posts'){
          if(payload.type==='INSERT'){
            if(!S.posts.find(function(p){return p.id===rec.id;})){
              S.posts.unshift(formatPost(rec));
              if(S.tab==='feed'&&!S.view) draw();
            }
          }
          if(payload.type==='DELETE'){
            S.posts = S.posts.filter(function(p){return p.id!==rec.id;});
            if(S.view==='detail'&&S.selPost&&S.selPost.id===rec.id) set({view:null,selPost:null});
            else if(S.tab==='feed'&&!S.view) draw();
          }
        }
        if(table==='messages'){
          if(payload.type==='INSERT'){
            var rIdx = S.rooms.findIndex(function(r){return r.id===rec.room_id;});
            if(rIdx>=0){
              if(!S.rooms[rIdx].messages.find(function(m){return m.id===rec.id;})){
                S.rooms[rIdx].messages.push(formatMessage(rec));
                if(S.view==='roomview'&&S.selRoom&&S.selRoom.id===rec.room_id){
                  S.selRoom=S.rooms[rIdx]; draw(); setTimeout(scrollChat,50);
                }
              }
            }
          }
        }
        if(table==='rooms'){
          if(payload.type==='INSERT'){
            if(!S.rooms.find(function(r){return r.id===rec.id;})){
              S.rooms.push(formatRoom(rec));
              if(S.tab==='chat'&&!S.view) draw();
            }
          }
          if(payload.type==='UPDATE'){
            var ri=S.rooms.findIndex(function(r){return r.id===rec.id;});
            if(ri>=0){ S.rooms[ri]=formatRoom(rec); if(S.view==='roomview'&&S.selRoom&&S.selRoom.id===rec.id){S.selRoom=S.rooms[ri];draw();} }
          }
        }
      } catch(err){}
    };
    _realtimeWs.onerror = function(){};
    _realtimeWs.onclose = function(){
      _realtimeWs=null;
      setTimeout(startRealtime, 3000); // reconnexion auto
    };
  } catch(e){}
}

// ── Formateurs (Supabase → format interne) ───────────
function formatPost(r){
  return {
    id:r.id, authorId:r.author_id, authorName:r.author_name,
    subject:r.subject, type:r.type, title:r.title,
    description:r.description||'', dueDate:r.due_date||'',
    files:r.files||[], createdAt:fmtAge(r.created_at)
  };
}
function formatRoom(r){
  return {
    id:r.id, name:r.name, emoji:r.emoji||'💬',
    desc:r.description||'', ownerId:r.owner_id||'',
    members:r.members||[], maxMembers:r.max_members||5,
    messages:r.messages||[]
  };
}
function formatMessage(r){
  return {
    id:r.id, authorId:r.author_id, authorName:r.author_name,
    text:r.text, time:fmtTime(r.created_at)
  };
}
function fmtAge(iso){
  if(!iso) return 'À l\'instant';
  var diff=Math.floor((Date.now()-new Date(iso).getTime())/1000);
  if(diff<60) return 'À l\'instant';
  if(diff<3600) return 'il y a '+Math.floor(diff/60)+'min';
  if(diff<86400) return 'il y a '+Math.floor(diff/3600)+'h';
  return 'il y a '+Math.floor(diff/86400)+'j';
}
function fmtTime(iso){
  if(!iso) return nowT();
  return new Date(iso).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}

// ── Chargement initial depuis Supabase ────────────────
var _loaded = false;
function loadFromSupabase(){
  Promise.all([sbGetPosts(), sbGetRooms(), sbGetAccounts()]).then(function(results){
    var posts = results[0];
    var rooms = results[1];
    var accounts = results[2];

    if(Array.isArray(posts)){
      // Si la base est vide, on insère les publications de démo
      if(posts.length === 0){
        seedSupabase();
      } else {
        S.posts = posts.map(formatPost);
      }
    }

    if(Array.isArray(rooms) && rooms.length >= 0){
      var roomObjs = rooms.map(formatRoom);
      var msgPromises = roomObjs.map(function(room){
        return sbGetMessages(room.id).then(function(msgs){
          room.messages = Array.isArray(msgs) ? msgs.map(formatMessage) : [];
          return room;
        });
      });
      return Promise.all(msgPromises).then(function(filledRooms){
        S.rooms = filledRooms.length > 0 ? filledRooms : S.rooms;
        if(Array.isArray(accounts)){
          accounts.forEach(function(a){
            S.accounts[a.id] = {
              id:a.id, name:a.name, role:a.role,
              subject:a.subject||'Maths', bio:a.bio||'',
              avatar:a.avatar||null, color:a.color||'#3B82F6',
              ratings:a.ratings||[]
            };
          });
        }
        _loaded=true; draw(); startRealtime();
      });
    }
    _loaded=true; draw(); startRealtime();
  }).catch(function(){
    _loaded=true; draw(); startRealtime();
  });
}

// ── Codes administrateurs (chiffrés SHA-256) ─────────
// Les codes en clair ne sont JAMAIS stockés dans ce fichier.
// Seuls leurs empreintes SHA-256 sont présentes — irréversibles.
var ADMIN_HASHES = {
  3906622573: 'Daaix1306',
  2598615863: 'Azizx'
};

// Calcule le hash SHA-256 d'une chaîne via l'API Web Crypto (native, aucune lib)
// Hash djb2 pur JS — synchrone, fonctionne partout sans crypto.subtle
function djb2Hash(str){
  var h = 5381;
  for(var i=0; i<str.length; i++){
    h = ((h << 5) + h) + str.charCodeAt(i);
    h = h & 0xFFFFFFFF;
  }
  return (h >>> 0); // unsigned 32-bit
}

// Vérifie le code admin — synchrone et fiable
function checkAdminCode(code){
  var hash = djb2Hash(code.trim());
  var name = ADMIN_HASHES[hash] || null;
  return Promise.resolve(name);
}
function isAdmin(){
  return !!(S.user && S.user.role === 'Administration');
}

// ── Helpers DOM ──────────────────────────────────────
function h(tag, attrs) {
  var e = document.createElement(tag);
  var kids = Array.prototype.slice.call(arguments,2);
  if (attrs) for (var k in attrs) {
    var v = attrs[k];
    if (k==='style'&&typeof v==='object') Object.assign(e.style,v);
    else if (k==='cls') e.className=v;
    else if (k.slice(0,2)==='on') e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  kids.forEach(function(c){
    if(c==null||c===false) return;
    if(Array.isArray(c)) c.forEach(function(cc){if(cc) e.appendChild(typeof cc==='string'?document.createTextNode(cc):cc);});
    else e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return e;
}
function tx(s){return document.createTextNode(String(s!=null?s:''));}

// ── LIGHTBOX & NOTIFICATIONS ──────────────────────
function buildImagePreview(files, stopPropFn){
  var imgs=files.filter(function(f){
    return f.dataUrl&&['jpg','jpeg','png','gif','webp','svg'].indexOf((f.name||'').split('.').pop().toLowerCase())>-1;
  });
  if(!imgs.length) return null;

  var allUrls=imgs.map(function(f){return f.dataUrl;});
  var strip=h('div',{cls:'img-preview-strip'});
  var MAX_SHOW=imgs.length===1?1:imgs.length<=3?imgs.length:3;

  imgs.slice(0,MAX_SHOW).forEach(function(f,i){
    var isLast=i===MAX_SHOW-1&&imgs.length>MAX_SHOW;
    var size=imgs.length===1?'100%':imgs.length===2?'calc(50% - 3px)':'calc(33.33% - 4px)';
    var height=imgs.length===1?'180px':'110px';
    var item=h('div',{cls:'img-preview-item',style:{width:size,height:height}});
    item.appendChild(h('img',{src:f.dataUrl,alt:f.name||'Image'}));
    if(isLast&&imgs.length>MAX_SHOW){
      item.appendChild(h('div',{cls:'img-preview-more'},tx('+'+(imgs.length-MAX_SHOW))));
    }
    var idx=i;
    item.addEventListener('click',function(e){
      e.stopPropagation();
      openLightbox(allUrls, idx);
    });
    strip.appendChild(item);
  });
  return strip;
}

function openLightbox(images, startIdx){
  _lbImages=images; _lbIdx=startIdx||0;
  var lb=document.getElementById('lightbox');
  var img=document.getElementById('lightbox-img');
  var ctr=document.getElementById('lightbox-counter');
  if(!lb||!img) return;
  img.src=_lbImages[_lbIdx];
  ctr.textContent=(_lbIdx+1)+'/'+_lbImages.length;
  var nav=document.getElementById('lightbox-nav');
  if(nav) nav.style.display=_lbImages.length>1?'flex':'none';
  lb.classList.add('open');
  document.body.style.overflow='hidden';
}

function closeLightbox(){
  var lb=document.getElementById('lightbox');
  if(lb) lb.classList.remove('open');
  document.body.style.overflow='';
}

function lbGo(dir){
  _lbIdx=(_lbIdx+dir+_lbImages.length)%_lbImages.length;
  var img=document.getElementById('lightbox-img');
  var ctr=document.getElementById('lightbox-counter');
  if(img) img.src=_lbImages[_lbIdx];
  if(ctr) ctr.textContent=(_lbIdx+1)+'/'+_lbImages.length;
}

function markRoomRead(roomId){
  var room=S.rooms.find(function(r){return r.id===roomId;});
  if(room) S.notif[roomId]=room.messages.length;
  saveNotif();
}

function countUnread(){
  if(!S.user) return 0;
  var total=0;
  S.rooms.forEach(function(room){
    var isMember=room.members.includes(S.user.id)||room.ownerId===S.user.id;
    if(!isMember) return;
    var seen=S.notif[room.id]||0;
    var count=room.messages.length;
    if(count>seen) total+=(count-seen);
  });
  return total;
}

function pushNotif(title, body, roomId){
  if(!('Notification' in window)||Notification.permission!=='granted') return;
  var n=new Notification(title,{body:body,icon:'',tag:roomId,renotify:true});
  n.onclick=function(){window.focus();if(roomId){var room=S.rooms.find(function(r){return r.id===roomId;});if(room){set({selRoom:room,view:'roomview',tab:'chat'});}}n.close();};
}

function requestNotifPermission(){
  if(!('Notification' in window)) return;
  if(Notification.permission==='default'){
    Notification.requestPermission();
  }
}

// Vérifier disponibilité du pseudo
function checkUsernameAvailable(username){
  return sbFetch('GET','accounts',null,'username=eq.'+encodeURIComponent(username)+'&limit=1')
    .then(function(res){ return !(Array.isArray(res) && res.length > 0); })
    .catch(function(){
      // Vérification locale en fallback
      return !Object.values(S.accounts).some(function(a){
        return (a.username||a.name).toLowerCase()===username.toLowerCase();
      });
    });
}

function doSetupNext(){
  var s=S.setup;

  if(s.step==='username'){
    if(!s.username||s.username.length<2){S.setup.usernameErr=true;draw();return;}
    if(s.usernameTaken){S.setup.usernameErr=true;draw();return;}
    if(!/^[a-zA-Z0-9_À-ÿ]{2,30}$/.test(s.username)){
      S.setup.usernameErr=true; draw();
      toast('⚠️ Pseudo invalide. Lettres, chiffres et _ uniquement.'); return;
    }
    // Vérification finale avant de passer
    checkUsernameAvailable(s.username).then(function(ok){
      if(!ok){S.setup.usernameTaken=true;S.setup.usernameErr=true;draw();return;}
      S.setup.step='role'; draw();
    });
    return;
  }

  if(s.step==='role'){
    if(s.role==='Professeur'){ S.setup.step='quiz'; S.setup.quizAns=''; S.setup.quizErr=false; draw(); return; }
    if(s.role==='Administration'){ S.setup.step='admincode'; S.setup.adminCode=''; S.setup.adminCodeErr=false; draw(); return; }
    S.setup.step='avatar'; draw(); return;
  }

  if(s.step==='quiz'){
    var qdata=getQuestion();
    if(!s.quizAns.trim()||!checkAnswer(s.quizAns,qdata.r)){
      S.setup.quizErr=true; draw();
      setTimeout(function(){S.setup.quizErr=false;draw();},2500); return;
    }
    S.setup.step='avatar'; S.setup.quizErr=false; draw(); return;
  }

  if(s.step==='admincode'){
    if(!s.adminCode.trim()){S.setup.adminCodeErr=true;draw();return;}
    checkAdminCode(s.adminCode).then(function(adminName){
      if(!adminName){
        S.setup.adminCodeErr=true; draw();
        setTimeout(function(){S.setup.adminCodeErr=false;draw();},2500); return;
      }
      S.setup.username=adminName;
      S.setup.step='avatar'; S.setup.adminCodeErr=false; draw();
    });
    return;
  }

  if(s.step==='avatar'){
    finaliseAccount();
  }
}

function finaliseAccount(){
  var s=S.setup;
  var gu=s.googleUser||{};
  var id='u_'+(gu.id||Date.now());
  var isAdminSignup=(s.role==='Administration');
  var avatarFinal=s.avatar||(gu.picture||null);
  var acc={
    id:id,
    name:s.username,
    username:s.username,
    email:gu.email||null,
    googleId:gu.id||null,
    role:isAdminSignup?'Administration':s.role,
    subject:s.subject,
    bio:s.bio,
    avatar:avatarFinal,
    color:isAdminSignup?'#18182E':s.color,
    ratings:[]
  };
  S.accounts[id]=acc; S.user=acc; saveUser();
  startPresence(); pingLocalPresence();
  if(isAdminSignup) toast('🛡️ Bienvenue Administrateur '+s.username+' !',3000);
  else toast('🎉 Bienvenue, '+s.username+' !');
  set({tab:'feed',view:null});
}

function buildFeed(){
  var wrap=h('div',{style:{padding:'14px 16px 110px',overflowY:'auto',flex:1,WebkitOverflowScrolling:'touch'}});

  // Barre de recherche : ✅ mutation silencieuse S.feedSearch = v
  // Le redraw est déclenché par le bouton "🔍" ou Enter, pas à chaque frappe.
  // Pour l'UX on fait un debounce léger (150ms) qui ne détruit pas le focus.
  var sb=h('div',{cls:'searchbar',style:{marginBottom:'13px'}});
  var si=Inp(S.feedSearch,function(v){
    S.feedSearch=v;
    clearTimeout(si._dt);
    si._dt=setTimeout(function(){refreshFeedList(listWrap);},150);
  },'Rechercher un devoir, exercice…',false);
  sb.appendChild(si); wrap.appendChild(sb);

  // Chips de filtre (clics → draw OK)
  var chips=h('div',{style:{display:'flex',gap:'7px',overflowX:'auto',paddingBottom:'13px',WebkitOverflowScrolling:'touch'}});
  ['Tous'].concat(SUBJECTS).forEach(function(s){
    var sc=acOf(s); var on=S.filter===s;
    chips.appendChild(Btn(s,function(){S.filter=s;refreshFeedList(listWrap);},{
      background:on?sc:'#fff',color:on?'#fff':'#3D3D5C',
      border:'1.5px solid '+(on?sc:'#E4E6F0'),
      borderRadius:'18px',padding:'5px 13px',fontSize:'12px',fontWeight:700,whiteSpace:'nowrap'
    }));
  });
  wrap.appendChild(chips);

  // Zone liste (refreshable sans détruire le searchbar)
  var listWrap=h('div');
  wrap.appendChild(listWrap);
  refreshFeedList(listWrap);
  return wrap;
}

    var em=h('div',{cls:'empty'});

    if(post.dueDate) badges.appendChild(Pill('📅 '+post.dueDate,'#EFF6FF','#3B82F6',{maxWidth:'100px',overflow:'hidden',textOverflow:'ellipsis'}));
    topRow.appendChild(badges); ct.appendChild(topRow);
    ct.appendChild(h('div',{style:{fontFamily:'Georgia,serif',fontSize:'15px',fontWeight:700,color:'#18182E',marginBottom:'4px'}},tx(post.title)));
    ct.appendChild(h('div',{style:{color:'#8888AA',fontSize:'12px',lineHeight:1.5,marginBottom:'11px',whiteSpace:'pre-line'}},

// Polling actif pour les messages du salon ouvert (filet de sécurité si WS lent)
var _msgPollInterval = null;
var _msgPollRoomId   = null;

function startMsgPolling(roomId){
  if(_msgPollRoomId === roomId) return; // déjà en cours
  stopMsgPolling();
  _msgPollRoomId = roomId;
  _msgPollInterval = setInterval(function(){
    if(!S.view || S.view !== 'roomview' || !S.selRoom) { stopMsgPolling(); return; }
    // Charger les nouveaux messages depuis Supabase
    var room = S.rooms.find(function(r){ return r.id === roomId; });
    if(!room) { stopMsgPolling(); return; }
    var lastId = room.messages.length > 0 ? room.messages[room.messages.length-1].id : '';
    sbFetch('GET','messages',null,
      'room_id=eq.'+roomId+'&order=created_at.asc&limit=50'
    ).then(function(msgs){
      if(!Array.isArray(msgs)) return;
      var rIdx = S.rooms.findIndex(function(r){ return r.id === roomId; });
      if(rIdx < 0) return;
      var have = new Set(S.rooms[rIdx].messages.map(function(m){ return m.id; }));
      var newMsgs = msgs.map(formatMessage).filter(function(m){ return !have.has(m.id); });
      if(newMsgs.length > 0){
        S.rooms[rIdx].messages = S.rooms[rIdx].messages.concat(newMsgs);
        if(S.selRoom && S.selRoom.id === roomId){
          S.selRoom = S.rooms[rIdx];
          draw(); setTimeout(scrollChat,50);
        }
      }
    }).catch(function(){});
  }, 3000); // toutes les 3 secondes
}

function stopMsgPolling(){
  if(_msgPollInterval){ clearInterval(_msgPollInterval); _msgPollInterval=null; }
  _msgPollRoomId = null;
}

function doSend(room,text){
  if(!text||!text.trim()) return;
  var msg={id:'m_'+Date.now()+'_'+S.user.id,authorId:S.user.id,authorName:S.user.name,text:text.trim(),time:nowT()};
  var idx=S.rooms.findIndex(function(r){return r.id===room.id;});
  if(idx>=0) S.rooms[idx].messages.push(msg);
  saveRooms();
  sbInsertMessage({
    id: msg.id,
    room_id: room.id,
    author_id: S.user.id,
    author_name: S.user.name,
    text: msg.text
  });
  S.chatMsg=''; S.selRoom=S.rooms[idx];
  draw(); setTimeout(scrollChat,50);
}

// ── LISTE UTILISATEURS ADMIN ─────────────────────────
function refreshAdminUserList(container, allAccounts){
  container.innerHTML='';
  var q=(S._adminSearch||'').trim().toLowerCase();
  var list=allAccounts.slice().reverse();
  if(q) list=list.filter(function(a){
    return (a.name||'').toLowerCase().includes(q)||
           (a.username||'').toLowerCase().includes(q)||
           (a.email||'').toLowerCase().includes(q)||
           (a.role||'').toLowerCase().includes(q);
  });

  if(!list.length){
    container.appendChild(h('div',{cls:'empty'},
      h('div',{cls:'empty-icon'},'👤'),
      h('div',{style:{fontWeight:700,color:'#18182E'}},'Aucun résultat')
    ));
    return;
  }

  var rolePill={Élève:['#E6FFF2','#18C964'],Professeur:['#EFF6FF','#3B82F6'],Administration:['#FFF0F2','#E8284A']};

function draw(){
  var root=document.getElementById('app');
  if(!root) return; // sécurité DOM
  root.innerHTML='';

  try {
    // Pas encore connecté Google → écran login
    if(!S.user && (!S.setup || !S.setup.googleUser)){
      root.appendChild(buildLogin());
      return;
    }

    // Connecté Google mais pas encore de compte → setup
    if(!S.user && S.setup && S.setup.googleUser){
      var card=h('div',{style:{background:'#fff',flex:1,overflowY:'auto',display:'flex',flexDirection:'column'}});
      card.appendChild(buildSetup());
      root.appendChild(card);
      return;
    }
  } catch(err) {
    // Si buildLogin ou buildSetup plante, afficher un message
    root.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:16px;font-family:sans-serif;padding:24px;text-align:center"><div style="font-size:48px">🎓</div><div style="font-size:20px;font-weight:800;color:#18182E">EduBoard</div><div style="color:#8888AA;font-size:13px">Chargement...</div><button onclick="window.location.reload()" style="margin-top:16px;background:#E8284A;color:#fff;border:none;border-radius:12px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer">Recharger</button></div>';
    return;
  }

  root.appendChild(buildTopBar());
  var body=h('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}});

  if(S.view==='detail')           body.appendChild(buildDetail());
  else if(S.view==='profview')    body.appendChild(buildProfView());
  else if(S.view==='editprofile') body.appendChild(buildEditProfile());
  else if(S.view==='roomview'){   body.appendChild(buildRoomChat());
    // Démarrer le polling de messages pour ce salon
    if(S.selRoom) startMsgPolling(S.selRoom.id);
  }
  else if(S.view==='createroom')  body.appendChild(buildCreateRoom());
  else if(S.tab==='feed')         body.appendChild(buildFeed());
  else if(S.tab==='chat')         body.appendChild(buildChat());
  else if(S.tab==='teachers')     body.appendChild(buildTeachers());
  else if(S.tab==='profile')      body.appendChild(buildProfile());
  else if(S.tab==='create')       body.appendChild(buildCreate());

  root.appendChild(body);
  if(!S.view) root.appendChild(buildNav());
}

// ── Service Worker (cache offline) ──────────────────
if('serviceWorker' in navigator){
  var swCode=[
    "const CACHE='eduboard-v1';",
    "self.addEventListener('install',e=>{self.skipWaiting();});",
    "self.addEventListener('activate',e=>{",
    "  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));",
    "});",
    "self.addEventListener('fetch',e=>{",
    "  if(e.request.method!=='GET') return;",
    "  e.respondWith(caches.open(CACHE).then(c=>c.match(e.request).then(r=>{",
    "    var f=fetch(e.request).then(res=>{c.put(e.request,res.clone());return res;}).catch(()=>r);",
    "    return r||f;",
    "  })));",
    "});"
  ].join('\n');
  var swBlob=new Blob([swCode],{type:'text/javascript'});
  var swUrl=URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(function(){});
}

function bootApp(){
  try { draw(); } catch(e){ console.error('draw error:',e); }
  setTimeout(function(){ hideSplash(); }, 400);
  loadFromSupabase();
  setTimeout(function(){
    if(S && S.user){ startPresence(); pingLocalPresence(); }

// Charger le SDK Supabase puis vérifier la session OAuth
getSupabase().then(function(sb){
  if(!sb){
    // SDK non chargé → démarrage normal sans OAuth
    bootApp();
    return;
  }

  // Laisser Supabase gérer automatiquement le token dans l'URL
  sb.auth.getSession().then(function(result){
    var session = result.data && result.data.session;

    if(session && session.user){
      var u = session.user;
      var meta = u.user_metadata || {};
      var googleUser = {
        id:      u.id,
        email:   u.email,
        name:    meta.full_name || meta.name || u.email,
        picture: meta.avatar_url || meta.picture || null
      };

      // Chercher si ce compte existe déjà en base
      sbFetch('GET','accounts',null,'google_id=eq.'+encodeURIComponent(u.id)+'&limit=1')
        .then(function(res){
          if(Array.isArray(res) && res.length > 0){
            // Compte existant → connexion directe
            var acc = res[0];
            S.user = {
              id:       acc.id,
              name:     acc.username || acc.name,
              username: acc.username || acc.name,
              email:    acc.email,
              googleId: acc.google_id,
              role:     acc.role,
              subject:  acc.subject || 'Maths',
              bio:      acc.bio || '',
              avatar:   acc.avatar || googleUser.picture || null,
              color:    acc.color || '#3B82F6',
              ratings:  acc.ratings || []
            };
            S.accounts[S.user.id] = S.user;
            saveUser();
            bootApp();
            setTimeout(function(){
              toast('🎉 Bon retour, '+S.user.name+' !');
              startPresence(); pingLocalPresence();
            }, 600);
          } else {
            // Nouveau compte → setup
            S.setup.googleUser = googleUser;
            S.setup.step = 'username';
            if(googleUser.name){
              var sug = googleUser.name.split(' ')[0].replace(/[^a-zA-Z0-9_]/g,'');
              if(sug.length >= 2) S.setup.username = sug;
            }
            if(googleUser.picture) S.setup.avatar = googleUser.picture;
            bootApp();
          }
        }).catch(function(){
          S.setup.googleUser = googleUser;
          S.setup.step = 'username';
          bootApp();
        });
    } else {
      // Pas de session → afficher login
      bootApp();
    }
  }).catch(function(){
    bootApp();
  });

  // Écouter les changements d'auth (connexion/déconnexion)
  sb.auth.onAuthStateChange(function(event, session){
    if(event === 'SIGNED_OUT'){
      S.user = null; resetSetup(); draw();
    }
  });

}).catch(function(){
  bootApp();
});

// Nettoyage propre quand l'utilisateur quitte la page
window.addEventListener('beforeunload', function(){
  if(typeof S === 'undefined' || !S.user) return;
  // Supprimer la session locale
  try {
    var sessions = JSON.parse(localStorage.getItem('eb_sessions')||'{}');
    var key = getLocalOnlineKey();
    delete sessions[key];
    localStorage.setItem('eb_sessions', JSON.stringify(sessions));
  } catch(e){}
  // Fermer les WebSockets proprement
  if(_presenceWs) _presenceWs.close();
  if(_realtimeWs) _realtimeWs.close();
});
</script>
</body>
</html>
